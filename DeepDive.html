<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── COLOR TOKENS ─── */
const C = {
  depth:'#04080f', deep:'#060e1c', navy:'#0a1628', ocean:'#0d2040',
  mid:'#103060', biolume:'#00e5d4', biolumeB:'#00fff2', coral:'#ff6e7a',
  amber:'#ffb84d', seafoam:'#6fd8be', text:'#ffffff',
  textSec:'rgba(255,255,255,0.65)', textMut:'rgba(255,255,255,0.35)',
  glass:'rgba(255,255,255,0.06)', glassBr:'rgba(255,255,255,0.1)',
  glassBd:'rgba(255,255,255,0.13)', glassCard:'rgba(8,22,50,0.7)',
};

/** Local SVG data URL — avoids blocked third-party placeholders for reel/place thumbs. */
const SPOT_PLACEHOLDER_SVG =
  'data:image/svg+xml,' +
  encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">' +
      '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">' +
      '<stop offset="0" stop-color="#00e5d4"/><stop offset="1" stop-color="#00a0e9"/></linearGradient></defs>' +
      '<rect width="128" height="128" rx="18" fill="#0a1628"/>' +
      '<path fill="url(#g)" d="M64 22c-15 0-26 11-26 24 0 20 26 46 26 46s26-26 26-46c0-13-11-24-26-24zm0 32a10 10 0 110-20 10 10 0 010 20z"/>' +
    '</svg>',
  );

/** Same-origin proxy for HTTPS CDN thumbs; data/blob URLs stay direct. */
function proxiedThumbSrc(src) {
  if (!src || typeof src !== 'string') return '';
  const s = src.trim();
  if (s.startsWith('data:') || s.startsWith('blob:')) return s;
  if (!/^https:\/\//i.test(s)) return s;
  return `${getApiBase()}/api/proxy-image?url=${encodeURIComponent(s)}`;
}

/** Remote CDN thumbnails: load via backend proxy + no-referrer fallback path. */
function ThumbImg({ src, alt = '', style }) {
  const [bad, setBad] = useState(false);
  useEffect(() => {
    setBad(false);
  }, [src]);
  const raw = src && String(src).trim() ? String(src).trim() : '';
  const effective = !raw || bad ? SPOT_PLACEHOLDER_SVG : proxiedThumbSrc(raw);
  return (
    <img
      src={effective}
      alt={alt}
      style={style}
      referrerPolicy="no-referrer"
      decoding="async"
      onError={() => setBad(true)}
    />
  );
}

/* ─── API (FastAPI backend) ─── */
function getApiBase() {
  const b = (typeof window !== 'undefined' && window.API_BASE_URL) || '';
  return String(b).replace(/\/$/, '') || 'http://127.0.0.1:8000';
}

function parseErrorDetail(detail) {
  if (typeof detail === 'string') return detail;
  if (Array.isArray(detail))
    return detail.map((x) => (x.msg || x.message || JSON.stringify(x))).join('; ');
  if (detail && typeof detail === 'object') return detail.detail || JSON.stringify(detail);
  return 'Request failed';
}

/** Strip invisible chars / odd whitespace so pasted mobile links still match. */
function normalizeTextForUrlSearch(s) {
  return String(s || '')
    .replace(/\uFEFF/g, '')
    .replace(/[\u200B-\u200D\uFEFF]/g, '')
    .replace(/[\u200C-\u200F\u202A-\u202E]/g, '') // bidi / format chars (often appended by Instagram, etc.)
    .replace(/[\u00A0\u1680\u2000-\u200A\u202F\u205F\u3000]/g, ' ')
    .replace(/[\r\n\t]+/g, ' ')
    .trim();
}

function stripTrailingUrlJunk(url) {
  return String(url || '')
    .replace(/[\u200C-\u200F\u202A-\u202E\uFEFF]+$/g, '')
    .replace(/[.,);'"\]]+$/, '')
    .trim();
}

function ensureHttpScheme(url) {
  let u = stripTrailingUrlJunk(url);
  if (!u) return '';
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u.replace(/^\/+/, '');
  return u;
}

/** Prefer place_id (stable); else lat,lng; else name search. Avoids broken or stale Google redirect URLs. */
function googleMapsOpenUrl(placeId, name, lat, lng) {
  const pid = String(placeId || '').trim();
  if (pid && !/^pin-/i.test(pid)) {
    return `https://www.google.com/maps/search/?api=1&query_place_id=${encodeURIComponent(pid)}`;
  }
  const la = typeof lat === 'number' ? lat : parseFloat(lat);
  const ln = typeof lng === 'number' ? lng : parseFloat(lng);
  if (Number.isFinite(la) && Number.isFinite(ln)) {
    return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${la},${ln}`)}`;
  }
  const q = String(name || '').trim();
  if (q) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
  return '';
}

function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/**
 * First social URL in pasted text (Instagram reels, TikTok, short links).
 * Handles scheme-less URLs (vm.tiktok.com/…), zero-width chars, and line breaks around the link.
 * Instagram often appends ?igsh=… (base64 may end with ==); we take https→first whitespace so the full query survives.
 */
function firstUrlInText(s) {
  const t = normalizeTextForUrlSearch(s);
  if (!t) return '';

  const httpAt = t.search(/\bhttps?:\/\//i);
  if (httpAt >= 0) {
    const fromHttp = t.slice(httpAt);
    const sp = fromHttp.search(/\s/);
    const chunk = sp < 0 ? fromHttp : fromHttp.slice(0, sp);
    const u = stripTrailingUrlJunk(chunk);
    if (/^https?:\/\//i.test(u)) return u;
  }

  let m = t.match(/\b(?:www\.|m\.)?(?:vm\.|vt\.)?tiktok\.com[^\s<>"']*/i);
  if (m) return ensureHttpScheme(m[0]);

  m = t.match(/\b(?:www\.)?tiktok\.com\/@[^\s/]+\/video\/\d+[^\s<>"']*/i);
  if (m) return ensureHttpScheme(m[0]);

  m = t.match(/\b(?:www\.)?tiktok\.com\/t\/[^\s<>"']+/i);
  if (m) return ensureHttpScheme(m[0]);

  m = t.match(/\b(?:www\.|m\.)?(?:instagram\.com|instagr\.am)\/[^\s<>"']+/i);
  if (m) return ensureHttpScheme(m[0]);

  return '';
}
function inferSocialPlatformFromUrl(url) {
  const u = String(url || '').toLowerCase();
  if (/tiktok\.com|vm\.tiktok|vt\.tiktok/.test(u)) return 'tiktok';
  if (/instagram\.com|instagr\.am/.test(u)) return 'instagram';
  return 'other';
}

/** Google Maps share / place links — resolved server-side via Places, no video pipeline. */
function isGoogleMapsUrl(url) {
  const u = String(url || '').toLowerCase();
  return /goo\.gl\/maps|maps\.app\.goo\.gl|\/maps\/place|maps\.google|google\.com\/maps/.test(u);
}

/** TikTok / Instagram reel URLs and Maps links use async POST /api/jobs + poll (reel-to-map pipeline). */
function useReelJobPipelineForUrl(url) {
  if (!url) return false;
  if (isGoogleMapsUrl(url)) return true;
  const p = inferSocialPlatformFromUrl(url);
  return p === 'tiktok' || p === 'instagram';
}

async function pollReelExtractionJob(jobId) {
  const delayMs = 2000;
  const maxAttempts = 90;
  for (let i = 0; i < maxAttempts; i++) {
    const j = await apiFetchJson(`/api/jobs/${jobId}`);
    if (j.status === 'done' && j.result && j.result.extract) return j;
    if (j.status === 'failed') throw new Error(j.error || 'Extraction failed');
    await new Promise((r) => setTimeout(r, delayMs));
  }
  throw new Error('Still processing — try again in a minute.');
}

const LS_USER_SPOTS = 'dd_user_spots';
/** Import-review appearance inside Add spots → extract: 'dark' | 'light' */
const LS_IMPORT_UI_THEME = 'dd_import_ui_theme';

  { id: 'd3', name: 'Manta Point', loc: 'Komodo', emoji: '🦈', color: '#6fd8be', listId: 'l1', lat: -8.6, lng: 119.5 },

function loadJson(key, fallback) {
  try {
    const s = localStorage.getItem(key);
    if (s == null || s === '') return fallback;
    const p = JSON.parse(s);
    return Array.isArray(p) ? p : fallback;
  } catch (_) {
    return fallback;
  }
}
function saveJson(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch (_) {}
}

/** Highest-confidence destination name (for map geocoding hints). */
function bestDestinationFromExtractRow(row) {
  const d = row?.destination_candidates || [];
  if (!d.length) return '';
  const sorted = [...d].sort((a, b) => (b.confidence || 0) - (a.confidence || 0));
  const top = sorted[0];
  return top && top.name ? String(top.name) : '';
}

/** Pull place rows from /extract results; prefer food venues when the model labels types. */
function pickPlacesFromExtract(data) {
  const row = data?.results && data.results[0];
  if (!row) return { places: [], destinationHint: '' };
  const dest = bestDestinationFromExtractRow(row);
  const places = row.place_candidates || [];
  const foodRe = /restaurant|cafe|coffee|bar|food|dining|bistro|eatery|bakery|pizza|sushi|grill|pub|brunch/i;
  const foodPlaces = places.filter((p) => foodRe.test(p.type || '') || foodRe.test(p.name || ''));
  const take = foodPlaces.length ? foodPlaces : places;
  return {
    destinationHint: dest,
    places: take.slice(0, 12).map((p) => ({
      name: p.name,
      type: p.type || 'place',
      confidence: p.confidence,
      reason: p.reason || '',
      lat: p.lat != null ? Number(p.lat) : undefined,
      lng: p.lng != null ? Number(p.lng) : undefined,
      google_place_id: p.google_place_id || undefined,
      formatted_address: p.formatted_address || undefined,
    })),
  };
}

/** Full extractor output (matches backend ExtractedPost) for the results panel. */
function ExtractInsightsSummary({ row, variant = 'dark' }) {
  if (!row) return null;
  const light = variant === 'light';
  const travelOk = row.is_travel_relevant !== false;
  const dests = row.destination_candidates || [];
  const activities = row.activities || [];
  const vibes = row.vibe_tags || [];
  const times = row.best_time_of_day || [];
  const budget = row.budget_signal || 'unknown';
  const pace = row.pace_signal || 'unknown';
  const notes = (row.notes || '').trim();
  const reviewStatus = String(row.review_status || '');
  const failureReason = String(row.failure_reason || '');
  const reviewText = (
    reviewStatus === 'auto_confirmed' ? 'Ready to save' :
    reviewStatus === 'not_travel_relevant' ? 'Not travel-relevant' :
    reviewStatus === 'needs_review' ? 'Needs review' : ''
  );
  const failureText = (
    failureReason === 'instagram_access_blocked' ? 'Instagram blocked caption/video access for this URL.' :
    failureReason === 'video_download_failed' ? 'Could not download the video for analysis.' :
    failureReason === 'places_unavailable' ? 'Maps place resolution is unavailable right now.' :
    failureReason === 'places_no_match' ? 'Could not confidently match extracted places.' :
    failureReason === 'no_location_signal' ? 'No clear location signal found in this source.' :
    failureReason === 'pipeline_error' ? 'Pipeline hit an internal error.' : ''
  );
  const chipStyle = (bg) => ({
    display:'inline-block', padding:'4px 10px', borderRadius:99, fontSize:11, fontWeight:700,
    background: bg || 'rgba(0,229,212,0.15)', color: C.biolume, marginRight:6, marginBottom:6,
  });
  const chipStyleLight = (bg, fg) => ({
    display:'inline-block', padding:'4px 10px', borderRadius:99, fontSize:11, fontWeight:700,
    background: bg, color: fg, marginRight:6, marginBottom:6, border:'1px solid rgba(17,24,39,0.08)',
  });
  return (
    <div
      data-testid="addspots-extract-insights"
      style={{
        marginBottom:14, padding:14, borderRadius:16,
        background: light
          ? (travelOk ? '#ffffff' : '#fff7ed')
          : (travelOk ? 'rgba(0,229,212,0.06)' : 'rgba(255,110,122,0.08)'),
        border: light
          ? `1px solid ${travelOk ? 'rgba(17,24,39,0.10)' : 'rgba(251,146,60,0.35)'}`
          : `1px solid ${travelOk ? 'rgba(0,229,212,0.25)' : 'rgba(255,110,122,0.35)'}`,
        boxShadow: light ? '0 10px 30px rgba(17,24,39,0.06)' : 'none',
      }}
    >
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, flexWrap:'wrap', gap:8 }}>
        <span style={{ color: light ? '#111827' : C.biolume, fontSize:12, fontWeight:900, letterSpacing:0.4 }}>AI extraction</span>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap', justifyContent:'flex-end' }}>
          <span style={{
            fontSize:11, fontWeight:800, padding:'4px 10px', borderRadius:99,
            background: light
              ? (travelOk ? 'rgba(37,99,235,0.10)' : 'rgba(239,68,68,0.10)')
              : (travelOk ? 'rgba(0,229,212,0.2)' : 'rgba(255,110,122,0.2)'),
            color: light
              ? (travelOk ? '#1d4ed8' : '#b91c1c')
              : (travelOk ? C.biolume : '#ffb3bc'),
          }}>{travelOk ? 'Travel signal: strong' : 'Travel signal: weak'}</span>
          {reviewText ? (
            <span style={{
              fontSize:11, fontWeight:800, padding:'4px 10px', borderRadius:99,
              background: reviewStatus === 'auto_confirmed'
                ? (light ? 'rgba(16,185,129,0.12)' : 'rgba(110,231,183,0.2)')
                : (light ? 'rgba(17,24,39,0.06)' : 'rgba(255,255,255,0.12)'),
              color: reviewStatus === 'auto_confirmed'
                ? (light ? '#047857' : '#9bf2cc')
                : (light ? '#111827' : '#f2f5ff'),
              border: light ? '1px solid rgba(17,24,39,0.08)' : 'none',
            }}>Status: {reviewText}</span>
          ) : null}
        </div>
      </div>
      {failureText ? (
        <div style={{
          marginBottom:10, padding:'8px 10px', borderRadius:10,
          background: light ? '#fff1f2' : 'rgba(255,110,122,0.12)',
          border: light ? '1px solid rgba(244,63,94,0.25)' : '1px solid rgba(255,110,122,0.28)',
          color: light ? '#9f1239' : '#ffc3ca',
          fontSize:11, fontWeight:700,
        }}>
          {failureText}
        </div>
      ) : null}
      {dests.length > 0 && (
        <div style={{ marginBottom:10 }}>
          <div style={{ color: light ? '#6b7280' : C.textMut, fontSize:10, fontWeight:800, marginBottom:6, textTransform:'uppercase' }}>Destinations</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {dests.map((d, i) => (
              <span key={i} style={{
                fontSize:12, color: light ? '#111827' : 'white', fontWeight:700,
                padding:'6px 10px', borderRadius:10,
                background: light ? '#f9fafb' : 'rgba(255,255,255,0.08)',
                border: light ? '1px solid rgba(17,24,39,0.10)' : `1px solid ${C.glassBd}`,
              }}>
                {d.name}
                {d.confidence != null ? (
                  <span style={{ color: light ? '#6b7280' : C.textMut, fontWeight:600, marginLeft:6 }}>
                    {Math.round((d.confidence || 0) * 100)}%
                  </span>
                ) : null}
              </span>
            ))}
          </div>
        </div>
      )}
      {(activities.length > 0 || vibes.length > 0) && (
        <div style={{ marginBottom:10 }}>
          {activities.length > 0 && (
            <div style={{ marginBottom:8 }}>
              <div style={{ color: light ? '#6b7280' : C.textMut, fontSize:10, fontWeight:800, marginBottom:6, textTransform:'uppercase' }}>Activities</div>
              <div>{activities.map((a, i) => (
                <span key={`act-${i}`} style={light ? chipStyleLight('rgba(37,99,235,0.08)', '#1d4ed8') : chipStyle('rgba(0,229,212,0.12)')}>{a}</span>
              ))}</div>
            </div>
          )}
          {vibes.length > 0 && (
            <div>
              <div style={{ color: light ? '#6b7280' : C.textMut, fontSize:10, fontWeight:800, marginBottom:6, textTransform:'uppercase' }}>Vibes</div>
              <div>{vibes.map((v, i) => (
                <span key={`vibe-${i}`} style={light ? chipStyleLight('rgba(124,58,237,0.10)', '#5b21b6') : { ...chipStyle('rgba(167,139,250,0.15)'), color: '#d4c4f5' }}>{v}</span>
              ))}</div>
            </div>
          )}
        </div>
      )}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginBottom: notes ? 10 : 0 }}>
        <div style={{
          padding:8, borderRadius:10,
          background: light ? '#f9fafb' : 'rgba(0,0,0,0.2)',
          border: light ? '1px solid rgba(17,24,39,0.08)' : 'none',
          fontSize:11,
        }}>
          <div style={{ color: light ? '#6b7280' : C.textMut, marginBottom:4 }}>Best time</div>
          <div style={{ color: light ? '#111827' : 'white', fontWeight:700 }}>{times.length ? times.join(', ') : '—'}</div>
        </div>
        <div style={{
          padding:8, borderRadius:10,
          background: light ? '#f9fafb' : 'rgba(0,0,0,0.2)',
          border: light ? '1px solid rgba(17,24,39,0.08)' : 'none',
          fontSize:11,
        }}>
          <div style={{ color: light ? '#6b7280' : C.textMut, marginBottom:4 }}>Budget</div>
          <div style={{ color: light ? '#111827' : 'white', fontWeight:700 }}>{budget}</div>
        </div>
        <div style={{
          padding:8, borderRadius:10,
          background: light ? '#f9fafb' : 'rgba(0,0,0,0.2)',
          border: light ? '1px solid rgba(17,24,39,0.08)' : 'none',
          fontSize:11,
        }}>
          <div style={{ color: light ? '#6b7280' : C.textMut, marginBottom:4 }}>Pace</div>
          <div style={{ color: light ? '#111827' : 'white', fontWeight:700 }}>{pace}</div>
        </div>
      </div>
      {notes ? (
        <div style={{
          marginTop:10, padding:10, borderRadius:10,
          background: light ? '#f9fafb' : 'rgba(255,255,255,0.04)',
          border: light ? '1px solid rgba(17,24,39,0.08)' : 'none',
          fontSize:12,
          color: light ? '#374151' : C.textSec,
          lineHeight:1.45,
        }}>
          <span style={{ color: light ? '#2563eb' : C.biolume, fontWeight:900, fontSize:10, display:'block', marginBottom:6 }}>Notes</span>
          {notes}
        </div>
      ) : null}
    </div>
  );
}

/** Saved from onboarding: age, trip intent, explore style ids (pins, list, guides, wing). */
function loadUserProfile() {
  try {
    return {
      age: localStorage.getItem('dd_profile_age') || '',
      trip: localStorage.getItem('dd_profile_trip') || '',
      styles: JSON.parse(localStorage.getItem('dd_profile_styles') || '[]'),
    };
  } catch (_) {
    return { age: '', trip: '', styles: [] };
  }
}

function personalityNearbyHint(styles) {
  const s = new Set(styles || []);
  if (s.has('wing')) {
    return 'Leaning into nightlife, bars & live energy — matches your drift-with-the-current vibe.';
  }
  if (s.has('guides')) {
    return 'Restaurants & standout attractions — fits how you like expert-led exploring.';
  }

  }
  if (s.has('pins')) {

}

/** Map onboarding “How do you explore?” to Google Places types (nearby). */
function nearbyPlaceTypesForProfile(profile) {
  const st = new Set(profile.styles || []);
  const food = [];
  const fun = [];
  if (st.has('wing')) {
    food.push('meal_takeaway', 'restaurant');
    fun.push('night_club', 'bar');
  }
  if (st.has('guides')) {
    food.push('restaurant');
    fun.push('tourist_attraction', 'movie_theater');
  }
  if (st.has('list')) {
    food.push('cafe', 'bakery');
    fun.push('movie_theater');
  }
  if (st.has('pins')) {
    food.push('restaurant', 'meal_takeaway');
    fun.push('park', 'tourist_attraction');
  }
  if (food.length === 0) {
    food.push('restaurant', 'cafe');
  }
  if (fun.length === 0) {
    fun.push('bar', 'movie_theater', 'tourist_attraction');
  }
  const uniq = (a) => [...new Set(a)].slice(0, 4);
  return { food: uniq(food), fun: uniq(fun) };
}

function haversineKm(a, b) {
  const R = 6371;
  const toRad = (d) => (d * Math.PI) / 180;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const x =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

/**
 * Nearby food + entertainment via Google Places (requires Maps JS + places library + API key).
 */
function fetchNearbyFoodAndFun(lat, lng, profile) {
  return new Promise((resolve, reject) => {
    if (!window.google || !google.maps || !google.maps.places) {
      reject(new Error('Places library not loaded'));
      return;
    }
    const { food, fun } = nearbyPlaceTypesForProfile(profile);
    const buckets = [
      ...food.map((type) => ({ type, bucket: 'food' })),
      ...fun.map((type) => ({ type, bucket: 'fun' })),
    ];
    const center = new google.maps.LatLng(lat, lng);
    const map = new google.maps.Map(document.createElement('div'));
    const service = new google.maps.places.PlacesService(map);
    const radius = 4500;
    const OK = google.maps.places.PlacesServiceStatus.OK;

    Promise.all(
      buckets.map(
        (b) =>
          new Promise((res) => {
            service.nearbySearch({ location: center, radius, type: b.type }, (results, status) => {
              if (status !== OK || !results) {
                res([]);
                return;
              }
              res(
                results.map((p) => ({
                  place: p,
                  bucket: b.bucket,
                  queryType: b.type,
                })),
              );
            });
          }),
      ),
    )
      .then((groups) => {
        const flat = groups.flat();
        const seen = new Set();
        const rows = [];
        for (const { place: p, bucket } of flat) {
          if (!p.geometry || !p.geometry.location) continue;
          const id = p.place_id || p.name + (p.vicinity || '');
          if (seen.has(id)) continue;
          seen.add(id);
          const plat = p.geometry.location.lat();
          const plng = p.geometry.location.lng();
          const km = Math.round(haversineKm({ lat, lng }, { lat: plat, lng: plng }) * 10) / 10;
          rows.push({
            id,
            name: p.name,
            rating: p.rating,
            vicinity: p.vicinity || '',
            km,
            bucket,
            lat: plat,
            lng: plng,
          });
        }
        rows.sort((a, b) => a.km - b.km);
        const foodRows = rows.filter((r) => r.bucket === 'food').slice(0, 10);
        const funRows = rows.filter((r) => r.bucket === 'fun').slice(0, 10);
        resolve({ food: foodRows, fun: funRows });
      })
      .catch(reject);
  });
}

function isFiniteGeoNum(n) {

/** Try several address strings so ambiguous venue names still geocode. */
function geocodeUserPlaceAddressChain(geo, place, onGeocodeResult) {
  const hint = String(place.destinationHint || '').trim();
  const name = String(place.name || '').trim();
  const queries = [];
  if (hint && name) queries.push(`${name}, ${hint}`);
  if (hint && name) queries.push(`${hint} ${name}`);
  if (hint && name) queries.push(`${name} in ${hint}`);
  if (name) queries.push(name);
  if (hint) queries.push(hint);
  const uniq = [];
  const seen = new Set();
  for (const q of queries) {
    if (!q || seen.has(q)) continue;
    seen.add(q);
    uniq.push(q);
  }
  const run = (i) => {
    if (i >= uniq.length) {
      onGeocodeResult(null);
      return;
    }
    geo.geocode({ address: uniq[i] }, (results, status) => {
      if (status === 'OK' && results && results[0]) {
        onGeocodeResult(results[0]);
      } else {
        run(i + 1);
      }
    });
  };
  run(0);
}

/**
 * Prefer resolved lat/lng from import pipeline, then Google place_id, then address variants.
 * @param {google.maps.Geocoder} geo
 * @param {object} place
 * @param {(r: google.maps.GeocoderResult | null) => void} onResult
 */
function resolveUserPlaceGeocode(geo, place, onResult) {
  const lat = place.lat;
  const lng = place.lng;
  if (isFiniteGeoNum(lat) && isFiniteGeoNum(lng)) {
    const loc = new google.maps.LatLng(lat, lng);
    const fa =
      String(place.formatted_address || '').trim() ||
      String(place.reason || '').split(' · ')[0].trim() ||
      '';
    onResult({
      geometry: { location: loc },
      formatted_address: fa || String(place.name || ''),
    });
    return;
  }
  const pid = place.google_place_id || place.googlePlaceId;
  if (pid) {
    geo.geocode({ placeId: String(pid) }, (results, status) => {
      if (status === 'OK' && results && results[0]) {
        onResult(results[0]);
      } else {
        geocodeUserPlaceAddressChain(geo, place, onResult);
      }
    });
    return;
  }
  geocodeUserPlaceAddressChain(geo, place, onResult);
}

/** Gentle scale vs map zoom — small range avoids jarring size jumps while pinch-zooming. */
function pingScaleForMapZoom(zoom) {
  const z = typeof zoom === 'number' && Number.isFinite(zoom) ? zoom : 14;
  return Math.max(8, Math.min(16, Math.round(7 + z * 0.35)));
}

function strokeWeightForPingScale(scale) {
  return Math.max(2, Math.min(5, Math.round(scale / 3.4)));
}

/**
 * Saved-spot ping: circle stays centered on the true lat/lng.
 * Map zoom updates are debounced so rapid pinch in/out does not flicker or stutter the icon.
 */
function createZoomAwareUserPingMarker({ map, position, title, fillColor, strokeColor }) {
  const latLng =
    position && typeof position.lat === 'function'
      ? position
      : new google.maps.LatLng(position.lat, position.lng);
  const marker = new google.maps.Marker({
    map,
    position: latLng,
    title: title || '',
    optimized: false,
  });
  let lastAppliedZoom = null;
  const applyIcon = () => {
    const z = map.getZoom();
    if (lastAppliedZoom === z) return;
    lastAppliedZoom = z;
    const scale = pingScaleForMapZoom(z);
    marker.setIcon({
      path: google.maps.SymbolPath.CIRCLE,
      scale,
      fillColor: fillColor || '#ffb84d',
      fillOpacity: 1,
      strokeColor: strokeColor || 'white',
      strokeWeight: strokeWeightForPingScale(scale),
    });
  };
  applyIcon();
  let debounceT = null;
  const scheduleApply = () => {
    if (debounceT != null) clearTimeout(debounceT);
    debounceT = setTimeout(() => {
      debounceT = null;
      lastAppliedZoom = null;
      applyIcon();
    }, 110);
  };
  const zoomListener = google.maps.event.addListener(map, 'zoom_changed', scheduleApply);
  let cleaned = false;
  const cleanup = () => {
    if (cleaned) return;
    cleaned = true;
    google.maps.event.removeListener(zoomListener);
    if (debounceT != null) clearTimeout(debounceT);
  };
  marker.__deepdivePingCleanup = cleanup;
  marker.addListener('map_changed', () => {
    if (!marker.getMap()) cleanup();
  });
  return marker;
}

async function waitForGoogleMaps(maxMs = 12000) {
  const start = Date.now();
  while (Date.now() - start < maxMs) {
    if (window.google && google.maps && google.maps.Geocoder) return true;
    await new Promise((r) => setTimeout(r, 120));
  }
  return false;
}

function geocodeAddressPromise(geo, address) {

      if (status === 'OK' && results && results[0] && results[0].geometry && results[0].geometry.location) {
        const loc = results[0].geometry.location;
        resolve({ lat: loc.lat(), lng: loc.lng() });

      }
    });
  });
}

/** Match Python `normalize_key` in app/services/scoring.py for itinerary ↔ candidate place_id. */
function normalizeTripPlaceId(value) {
  return String(value || '').trim().toLowerCase().replace(/ /g, '_');
}

/** Fuzzy name match when the LLM tweaks punctuation or “&” vs “and”. */
function normalizeTripNameLoose(s) {
  return String(s || '')
    .trim()
    .toLowerCase()
    .replace(/&/g, 'and')
    .replace(/[^a-z0-9]+/g, '');
}

function geocodePlaceIdPromise(geo, placeId) {

        resolve({ lat: loc.lat(), lng: loc.lng() });

      }

}

/**
 * Resolve planner itinerary item → candidate place (coords / Places id) even when LLM rewrites labels.
 */
function findCandidateForItineraryItem(it, places, byId, byNormId, byNameLower, byNameLoose) {
  const pid = String(it.place_id || '').trim();
  if (pid) {
    let c = byId.get(pid) || byNormId.get(normalizeTripPlaceId(pid));
    if (c) return c;
    const np = normalizeTripPlaceId(pid);
    for (const p of places) {
      if (normalizeTripPlaceId(p.place_id) === np) return p;
      const gid = p.google_place_id && String(p.google_place_id).trim();
      if (gid && gid === pid) return p;
    }
  }
  const nm = String(it.name || '').trim().toLowerCase();
  if (nm) {
    let c = byNameLower.get(nm);
    if (c) return c;
    const loose = normalizeTripNameLoose(it.name);
    if (loose) {
      c = byNameLoose.get(loose);
      if (c) return c;
    }
  }
  return null;
}

/** Spread stacked pins (e.g. same city-center fallback) so numbered markers are readable. */
function jitterOverlappingPlanPins(pins) {
  const buckets = new Map();
  pins.forEach((pin, i) => {
    const lat = pin[0];
    const lng = pin[1];
    const k = `${lat.toFixed(5)},${lng.toFixed(5)}`;
    if (!buckets.has(k)) buckets.set(k, []);
    buckets.get(k).push(i);
  });
  buckets.forEach((indices) => {
    if (indices.length <= 1) return;
    indices.forEach((pi, j) => {
      if (j === 0) return;
      const pin = pins[pi];
      const n = j;
      pin[0] += (n % 8) * 0.00025;
      pin[1] += Math.floor(n / 8) * 0.00025;
    });
  });
}

/**
 * Map pins to itinerary stops only (no duplicate candidate dump + fake grid).
 * Resolves coordinates from candidate places, then Geocoding "name, destination" when needed.
 */
async function mapPlanFromPostsToTrip(data, destName) {
  const apiTrip = data.trip;
  const places = data.candidate_places || [];
  const byId = new Map();
  const byNormId = new Map();
  const byNameLower = new Map();
  const byNameLoose = new Map();
  for (const p of places) {
    const id = String(p.place_id || '');
    if (id) {
      byId.set(id, p);
      byNormId.set(normalizeTripPlaceId(id), p);
    }
    const gid = p.google_place_id && String(p.google_place_id).trim();
    if (gid) byId.set(gid, p);
    const k = String(p.name || '').trim().toLowerCase();
    if (k) byNameLower.set(k, p);
    const nl = normalizeTripNameLoose(p.name);
    if (nl) byNameLoose.set(nl, p);
  }
  const destStr = String(apiTrip.destination || destName || '').trim();

  const itineraryItems = [];
  const seen = new Set();
  for (const day of apiTrip.days || []) {
    for (const it of day.items || []) {
      const dedupeKey = String(it.place_id || '') + '\0' + String(it.name || '');
      if (seen.has(dedupeKey)) continue;
      seen.add(dedupeKey);
      itineraryItems.push(it);
      if (itineraryItems.length >= 24) break;
    }
    if (itineraryItems.length >= 24) break;
  }

  const pins = [];
  const hasMaps = await waitForGoogleMaps();
  const geo = hasMaps ? new google.maps.Geocoder() : null;

  let destCenter = null;
  if (geo && destStr) {
    destCenter = await geocodeAddressPromise(geo, destStr);
  }

  for (const it of itineraryItems) {
    const c = findCandidateForItineraryItem(it, places, byId, byNormId, byNameLower, byNameLoose);
    let lat;
    let lng;
    if (c != null && c.lat != null && c.lng != null && isFiniteGeoNum(c.lat) && isFiniteGeoNum(c.lng)) {
      lat = c.lat;
      lng = c.lng;
    } else if (geo && c != null && c.google_place_id) {
      const gp = await geocodePlaceIdPromise(geo, c.google_place_id);
      if (gp) {
        lat = gp.lat;
        lng = gp.lng;
      }
    }
    if (geo && !isFiniteGeoNum(lat)) {
      let r = null;
      if (destStr) {
        r = await geocodeAddressPromise(geo, `${it.name}, ${destStr}`);
      }
      if (!r && destStr) {
        r = await geocodeAddressPromise(geo, `${it.name} near ${destStr}`);
      }
      if (!r && c != null && c.neighborhood && destStr) {
        r = await geocodeAddressPromise(geo, `${it.name}, ${c.neighborhood}, ${destStr}`);
      }
      if (!r && destCenter) {
        r = destCenter;
      }
      if (r) {
        lat = r.lat;
        lng = r.lng;
      }
    }
    if (isFiniteGeoNum(lat) && isFiniteGeoNum(lng)) {
      pins.push([lat, lng, it.name, it.place_id || '']);
    }
  }

  jitterOverlappingPlanPins(pins);

  let center = null;
  if (pins.length > 0) {
    const sumLat = pins.reduce((s, p) => s + p[0], 0);
    const sumLng = pins.reduce((s, p) => s + p[1], 0);
    center = [sumLat / pins.length, sumLng / pins.length];
  } else if (destCenter) {
    center = [destCenter.lat, destCenter.lng];
  } else {
    center = roughCenterForDestination(destStr || 'trip');
  }

  if (pins.length === 0 && itineraryItems.length > 0) {
    const rc = destCenter ? [destCenter.lat, destCenter.lng] : center;
    itineraryItems.slice(0, 12).forEach((it, idx) => {
      pins.push([
        rc[0] + (idx % 4) * 0.025,
        rc[1] + Math.floor(idx / 4) * 0.025,
        it.name,
        it.place_id || '',
      ]);
    });
    if (pins.length > 0) {
      const sumLat = pins.reduce((s, p) => s + p[0], 0);
      const sumLng = pins.reduce((s, p) => s + p[1], 0);
      center = [sumLat / pins.length, sumLng / pins.length];
    }
  }

  const spots = (apiTrip.days || []).reduce((n, d) => n + (d.items?.length || 0), 0);
  return {
    id: Date.now(),
    title: apiTrip.destination || destName,
    loc: apiTrip.destination || destName,
    days: (apiTrip.days || []).length || 1,
    spots: spots || 1,
    color: '#6fd8be',
    center,
    zoom: 12,
    pins,
    tripPlan: apiTrip,
    aiSummary: apiTrip.summary,
    planningNotes: apiTrip.planning_notes || [],
    candidatePlaces: places,
  };
}

async function planFromPostsRequest(ctx) {
  const days = computeTripDays(ctx.dateFrom, ctx.dateTo);
  const interestLine = Array.from(ctx.interests || []).join(', ');
  const raw = [ctx.dest, interestLine].filter(Boolean).join('. ');
  const body = {
    posts: [
      {

        url: 'https://deepdive.app/plan',
        platform: 'other',
        caption: ctx.dest,
        transcript: '',
        ocr_text: '',
        thumbnail_text: '',
        raw_text: raw || ctx.dest,
      },
    ],
    trip_constraints: {
      days,
      budget: 'medium',
      pace: 'moderate',
      group_type: 'friends',
      must_include: [],
      avoid: [],
      transport_mode: 'public_transit',

/* ─── GOOGLE MAPS ─── */
function OceanMap({ mapRef: externalMapRef, onMarkerClick }) {
  const containerRef = useRef(null);
  const mapInstance = useRef(null);

  useEffect(() => {
    if (!containerRef.current || mapInstance.current) return;

    const map = new google.maps.Map(containerRef.current, {
      center: { lat: 20, lng: 10 },
      zoom: 2,
      disableDefaultUI: true,
      zoomControl: true,
      zoomControlOptions: { position: google.maps.ControlPosition.BOTTOM_RIGHT },
      gestureHandling: 'greedy',
    });

    const makeIcon = (color) => ({
      path: google.maps.SymbolPath.CIRCLE,
      scale: 8,
      fillColor: color || '#a78bfa',
      fillOpacity: 1,
      strokeColor: 'white',
      strokeWeight: 2,
    });

    [
      [13.5, 123.8, 'Coral Triangle', 1],
      [4.2, 73.5, 'Maldives', 3],
      [-18.3, 147.7, 'Great Barrier Reef', 2],
      [7.9, 134.5, 'Palawan', null],
      [-0.7, 130.9, 'Raja Ampat', null],
      [17.3, -87.5, 'Blue Hole', null],
    ].forEach(([lat, lng, name, tripId]) => {
      const marker = new google.maps.Marker({
        position: { lat, lng },
        map,
        icon: makeIcon('#a78bfa'),
        title: name,
      });

      if (tripId) {
        marker.addListener('click', () => {
          if (onMarkerClick) onMarkerClick(tripId);
        });
      } else {
        const info = new google.maps.InfoWindow({
          content: `<b style="color:#a78bfa;font-family:Nunito,sans-serif">${name}</b>`,
        });
        marker.addListener('click', () => info.open(map, marker));
      }
    });

    mapInstance.current = map;
    if (externalMapRef) externalMapRef.current = map;

    return () => {
      mapInstance.current = null;
      if (externalMapRef) externalMapRef.current = null;
    };
  }, []);

  return (
    <div ref={containerRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} />
  );
}

/** Build a planner-friendly destination string from spots in a user list. */
function buildPlanDestFromUserList(list, spotsInList) {
  if (!list) return '';
  if (!spotsInList || spotsInList.length === 0) return list.name || '';
  const names = spotsInList.map((s) => s.name).filter(Boolean);
  const locs = spotsInList.map((s) => s.loc).filter(Boolean).sort((a, b) => b.length - a.length);
  const locHint = locs[0] || '';
  const placeLine = names.slice(0, 10).join(', ');
  const core =
    locHint.length > 2
      ? locHint.split(',').map((x) => x.trim()).slice(-3).join(', ') || locHint
      : names[0] || list.name;
  return `${core}. From my list “${list.name}”: ${placeLine}${names.length > 10 ? '…' : ''}`;
}

          const today=new Date(); today.setHours(0,0,0,0);
          const cells = [];
          for(let i=0;i<first;i++) cells.push(null);
          for(let d=1;d<=days;d++) cells.push(new Date(y,m,d));
          const pick = (d) => {
            if(!d||d<today) return;
            const t=d.getTime();
            if(!dateFrom||(dateFrom&&dateTo)){setDateFrom(t);setDateTo('');}
            else if(t<dateFrom){setDateFrom(t);}
            else{setDateTo(t);}
          };
          return (
            <div data-testid="plan-calendar" style={{marginTop:8,padding:'16px',borderRadius:14,background:C.glass,border:`1px solid ${C.glassBd}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <button type="button" data-testid="plan-cal-prev" onClick={()=>setCalMonth(new Date(y,m-1,1))} style={{background:'none',border:'none',color:C.biolume,fontSize:20,cursor:'pointer',padding:4}}>‹</button>
                <div style={{color:'white',fontWeight:800,fontSize:15}}>{calMonth.toLocaleString('en-US',{month:'long',year:'numeric'})}</div>
                <button type="button" data-testid="plan-cal-next" onClick={()=>setCalMonth(new Date(y,m+1,1))} style={{background:'none',border:'none',color:C.biolume,fontSize:20,cursor:'pointer',padding:4}}>›</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
                {['S','M','T','W','T','F','S'].map((d,i)=>(
                  <div key={i} style={{textAlign:'center',color:C.textMut,fontSize:11,fontWeight:700,padding:'4px 0'}}>{d}</div>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
                {cells.map((d,i)=>{
                  if(!d) return <div key={i}/>;
                  const t=d.getTime();
                  const isPast=d<today;
                  const isFrom=dateFrom===t, isTo=dateTo===t;
                  const inRange=dateFrom&&dateTo&&t>dateFrom&&t<dateTo;
                  const selected=isFrom||isTo;
                  return (
                    <div
                      key={i}
                      role="button"
                      tabIndex={isPast ? -1 : 0}
                      data-testid={isPast ? undefined : 'plan-cal-day'}
                      data-day-ts={t}
                      onClick={()=>pick(d)}
                      onKeyDown={(e) => {
                        if (isPast) return;
                        if (e.key === 'Enter' || e.key === ' ') {
                          e.preventDefault();
                          pick(d);
                        }
                      }}
                      style={{
                      aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:13,fontWeight:selected?800:600,
                      color:isPast?C.textMut:selected?C.deep:inRange?C.biolume:'white',
                      background:selected?C.biolume:inRange?'rgba(0,229,212,0.15)':'transparent',
                      borderRadius:isFrom&&dateTo?'8px 0 0 8px':isTo?'0 8px 8px 0':inRange?'0':'8px',
                      cursor:isPast?'default':'pointer',opacity:isPast?0.35:1,transition:'all 0.15s',
                    }}>{d.getDate()}</div>
                  );
                })}
              </div>
              {(dateFrom||dateTo) && (
                <button onClick={()=>{setDateFrom('');setDateTo('');}} style={{
                  marginTop:10,width:'100%',padding:8,borderRadius:10,
                  background:'transparent',border:`1px solid ${C.glassBd}`,
                  color:C.textSec,fontSize:12,fontWeight:700,cursor:'pointer'}}>Clear dates</button>
              )}
            </div>
          );
        })()}
        {/* Interests */}
        <div style={{marginTop:12}}>
          <button
            type="button"
            data-testid="plan-open-interests"
            onClick={() => { setInterestPickerOpen(true); setInterestSearch(''); }}
            style={{
              width:'100%',padding:'14px 16px',borderRadius:14,background:C.glass,border:`1px solid ${C.glassBd}`,
              display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',marginBottom:8,
              fontFamily:'inherit',textAlign:'left',
            }}
          >
            <span style={{color:'white',fontWeight:600}}>
              🎯 Preferences
              {interestsCatalogLoading ? (
                <span style={{color:C.textSec,fontWeight:600,fontSize:12,marginLeft:8}}>(loading catalog…)</span>
              ) : (
                <span style={{color:C.textSec,fontWeight:600,fontSize:12,marginLeft:8}}>
                  ({interestCatalog.length} options)
                </span>
              )}
            </span>
            <span style={{color:C.biolume,fontWeight:700,fontSize:14}}>
              {interests.size ? `${interests.size} selected · Edit` : 'Add interests'}

          </button>
          {interests.size > 0 && (

                <button

                    border:`1px solid ${C.biolume}55`,fontFamily:'inherit',

                  {label} <span style={{opacity:0.85}}>×</span>

              ))}
            </div>
          )}
          <div style={{color:C.textMut,fontSize:11,lineHeight:1.4}}>
            Included in your plan request (API catalog or offline fallback).
          </div>
        </div>
      </div>
      {interestPickerOpen && (
        <div
          role="dialog"
          aria-modal="true"
          aria-label="Choose trip interests"
          style={{
            position:'absolute',inset:0,zIndex:60,

          }}
        >
          <div style={{padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`1px solid ${C.glassBd}`,flexShrink:0}}>
            <button type="button" onClick={() => setInterestPickerOpen(false)} style={{background:'transparent',border:'none',color:C.biolume,fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>← Back</button>
            <div style={{color:'white',fontWeight:800,fontSize:16}}>Choose interests</div>
            <button type="button" data-testid="plan-interests-done" onClick={() => setInterestPickerOpen(false)} style={{background:C.biolume,border:'none',borderRadius:10,padding:'8px 14px',color:C.deep,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>Done</button>
          </div>
          <div style={{padding:'12px 16px',flexShrink:0}}>
            <input

            {interestGroupsFiltered.length === 0 ? (
              <div style={{color:C.textSec,fontSize:13,padding:16}}>No matches. Try another search.</div>
            ) : (
              interestGroupsFiltered.map(([cat, items]) => (
                <div key={cat} style={{marginBottom:18}}>

                          onClick={() => toggleInterestLabel(it.label)}

            )}

        </div>
      )}
      <div style={{padding:'16px 20px',borderTop:`1px solid ${C.glassBd}`}}>
        <button type="button" onClick={runPlan} disabled={!dest||loading||!datesReady} style={{
          width:'100%',padding:'16px',borderRadius:14,fontSize:16,fontWeight:800,cursor:!dest||loading||!datesReady?'default':'pointer',
          background:dest&&datesReady&&!loading?`linear-gradient(135deg,${C.biolume},#00a0e9)`:'rgba(255,255,255,0.08)',
          color:dest&&datesReady&&!loading?C.deep:'rgba(255,255,255,0.3)',border:'none',transition:'all 0.3s',
          boxShadow:dest&&datesReady&&!loading?'0 0 30px rgba(0,229,212,0.35)':'none',
          opacity:loading?0.85:1,
        }} data-testid="plan-submit">{loading ? 'Planning…' : '🗺️ Plan This Trip'}</button>
      </div>
    </div>
  );
}

/* ─── TRIP DETAIL ─── */
function activityTypeIcon(activityType) {
  const t = String(activityType || '').toLowerCase();
  if (t.includes('dive')) return '🤿';
  if (t.includes('snorkel')) return '🐠';
  if (t.includes('food') || t.includes('meal') || t.includes('eat')) return '🍽️';
  if (t.includes('boat') || t.includes('sail')) return '⛵';
  if (t.includes('beach') || t.includes('swim')) return '🏖️';
  if (t.includes('photo')) return '📷';
  if (t.includes('shop') || t.includes('market')) return '🛍️';
  if (t.includes('hike') || t.includes('trek')) return '🥾';
  if (t.includes('night')) return '🌙';
  return '📍';
}

function openingHoursForPlaceId(placeId, candidatePlaces) {
  const found = (candidatePlaces || []).find((p) => p.place_id === placeId);
  return found && found.opening_hours ? String(found.opening_hours) : '';
}

function candidatePlaceForTripItem(it, candidatePlaces) {
  return (candidatePlaces || []).find((p) => p.place_id === it.place_id) || null;
}

function buildSyntheticTripPlan(trip) {
  if (trip.tripPlan && Array.isArray(trip.tripPlan.days) && trip.tripPlan.days.length) {
    return trip.tripPlan;
  }
  const pins = trip.pins || [];
  const nDays = Math.max(1, Math.min(trip.days || 1, 14));
  if (pins.length === 0) {
    return { destination: trip.title, summary: '', days: [], planning_notes: [] };
  }
  const perDay = Math.max(1, Math.ceil(pins.length / nDays));
  const days = [];
  for (let d = 0; d < nDays; d++) {
    const slice = pins.slice(d * perDay, (d + 1) * perDay);
    if (slice.length === 0) break;
    const items = slice.map(([lat, lng, name], i) => {
      const hour = 9 + i * 2;
      const time = `${String(Math.min(hour, 20)).padStart(2, '0')}:00`;
      return {
        time,
        place_id: `pin-${d}-${i}`,
        name,
        activity_type: 'dive',
        duration_minutes: 90,
        why_included: 'Along your expedition route',
      };
    });
    days.push({
      day: d + 1,
      area: trip.loc || 'Region',
      theme: d === 0 ? 'Coastal & reefs' : `Day ${d + 1} route`,
      items,
      backup_options: [],
    });
  }
  return {
    destination: trip.title,
    summary: trip.aiSummary || `Explore ${trip.loc} across ${days.length} days.`,
    days,
    planning_notes: trip.planningNotes || [],
  };
}

function TripDayTimeline({ day, candidatePlaces, lineColor }) {
  const items = day.items || [];
  if (items.length === 0) {
    return <div style={{ color: C.textSec, fontSize: 13 }}>No stops scheduled.</div>;
  }
  return (
    <div data-testid={`trip-day-${day.day}-timeline`}>
      {items.map((it, idx) => {
        const icon = activityTypeIcon(it.activity_type);
        const hours = openingHoursForPlaceId(it.place_id, candidatePlaces);
        const cand = candidatePlaceForTripItem(it, candidatePlaces);
        const mapsHref = googleMapsOpenUrl(
          it.place_id,
          it.name,
          cand != null ? cand.lat : undefined,
          cand != null ? cand.lng : undefined,
        );
        const last = idx === items.length - 1;
        return (
          <div key={`${it.place_id}-${idx}`} style={{ display: 'flex', gap: 14, alignItems: 'stretch' }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: 48, flexShrink: 0 }}>
              <div
                style={{
                  width: 44,
                  height: 44,
                  borderRadius: '50%',
                  background: `linear-gradient(145deg, ${lineColor}35, ${C.glass})`,
                  border: `2px solid ${lineColor}`,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  fontSize: 22,
                  boxShadow: `0 0 18px ${lineColor}55`,
                  zIndex: 2,
                }}
              >
                {icon}
              </div>
              {!last && (
                <div
                  style={{
                    width: 4,
                    height: 40,
                    marginTop: 4,
                    borderRadius: 2,
                    background: `linear-gradient(180deg, ${lineColor}, #00a0e9)`,
                    opacity: 0.95,
                  }}
                />
              )}
            </div>
            <div style={{ flex: 1, paddingBottom: last ? 4 : 18, minWidth: 0 }}>
              <div style={{ color: lineColor, fontWeight: 900, fontSize: 14, letterSpacing: 0.3 }}>{it.time}</div>
              <div style={{ color: 'white', fontWeight: 800, fontSize: 15, marginTop: 2 }}>{it.name}</div>
              <div style={{ color: C.textSec, fontSize: 12, marginTop: 4 }}>
                {it.activity_type} · {it.duration_minutes} min
              </div>
              {mapsHref ? (
                <div style={{ marginTop: 8 }}>
                  <a
                    href={mapsHref}
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{ color: C.biolume, fontSize: 12, fontWeight: 800 }}
                  >
                    Open in Google Maps →
                  </a>
                </div>
              ) : null}
              <div style={{ color: C.textMut, fontSize: 11, marginTop: 6, lineHeight: 1.45 }}>
                {hours ? (
                  <>
                    <span style={{ color: C.biolume, fontWeight: 700 }}>Hours: </span>
                    {hours}
                  </>
                ) : (
                  <>Opening hours: check with venue (not in plan data)</>
                )}
              </div>
              {it.why_included && (
                <div
                  style={{
                    color: C.textSec,
                    fontSize: 11,
                    marginTop: 8,
                    lineHeight: 1.45,
                    padding: '8px 10px',
                    borderRadius: 10,
                    background: 'rgba(0,160,233,0.08)',
                    border: `1px solid ${C.glassBd}`,
                  }}
                >
                  {it.why_included}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TripDetail({ trip, onBack }) {
  const plan = buildSyntheticTripPlan(trip);
  const days = plan.days || [];
  const candidates = trip.candidatePlaces || [];
  const lineColor = trip.color || C.biolume;
  const tabIds = ['overview', ...days.map((d) => `day-${d.day}`)];
  const [tab, setTab] = useState('overview');
  const [expandedDays, setExpandedDays] = useState(() => {
    const s = new Set();
    days.forEach((d) => s.add(d.day));
    return s;
  });
  const toggleDayExpand = (dayNum) => {
    setExpandedDays((prev) => {
      const n = new Set(prev);
      if (n.has(dayNum)) n.delete(dayNum);
      else n.add(dayNum);
      return n;
    });
  };
  const summaryText = plan.summary || trip.aiSummary || '';

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: `linear-gradient(180deg,${C.navy},${C.deep})` }}>

            border: `1px solid ${C.glassBd}`,

            padding: '8px 14px',
            color: 'white',
            fontWeight: 700,
            fontSize: 14,
            cursor: 'pointer',

          style={{
            background: `linear-gradient(135deg,${C.biolume},#00a0e9)`,
            border: 'none',
            borderRadius: 99,
            padding: '8px 16px',
            color: C.deep,
            fontWeight: 800,
            fontSize: 13,
            cursor: 'pointer',
          }}
        >
          💾 Save Trip
        </button>
      </div>
      <div
        style={{
          margin: '0 20px',
          height: 140,
          borderRadius: 18,
          overflow: 'hidden',
          position: 'relative',
          background: `linear-gradient(135deg,${C.ocean},${C.mid})`,
          border: `1px solid ${C.glassBd}`,
          flexShrink: 0,
        }}

        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ color: C.biolume, opacity: 0.25, fontSize: 72 }}>🗺️</div>
        </div>
        <svg viewBox="0 0 320 120" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
          <path d="M 40 75 Q 100 35, 160 60 T 300 50" fill="none" stroke={lineColor} strokeWidth="3" strokeLinecap="round" opacity="0.85" />

                      · {b}

                  ))}

              )}

          ) : null,
        )}
      </div>
    </div>
  );
}

  onClose,
  userLists = [],
  onAddPlaceToMap = () => {},
  onAddPlaceToList = () => {},
  onCreateList = () => '',
  importUiTheme = 'dark',
}) {
  const extractFileInputRef = useRef(null);
  const [view, setView] = useState('grid');
  const [extractText, setExtractText] = useState('');
  /** @type {null | { preview: string, base64: string, mime: string, name: string }} */
  const [extractImage, setExtractImage] = useState(null);
  const [extractLoading, setExtractLoading] = useState(false);
  const [extractErr, setExtractErr] = useState('');
  const [extractJson, setExtractJson] = useState(null);
  const [extractMeta, setExtractMeta] = useState(null);
  const [showImportReview, setShowImportReview] = useState(false);
  /** Header moon/sun applies to all Add spots → extract screens (paste, results, review). */
  const reviewLight = importUiTheme === 'light';
  const sourceReviewDark = importUiTheme === 'dark';
  const [listPickByIdx, setListPickByIdx] = useState({});
  /** Target list for bulk toolbar (Add to List / Map + list). Kept in sync with `userLists`. */
  const [bulkImportListId, setBulkImportListId] = useState('');
  const [addedPlaces, setAddedPlaces] = useState({});
  const [selectedPlaceKeys, setSelectedPlaceKeys] = useState({});
  const [newListName, setNewListName] = useState('');
  /** How user opened analyze: notes = list paste only (no social URL blurb). */
  const [extractEntry, setExtractEntry] = useState('links');
  const [tiktokSearchQuery, setTiktokSearchQuery] = useState('');
  const resetExtractPanel = () => {
    setExtractErr('');
    setExtractJson(null);
    setExtractMeta(null);
    setShowImportReview(false);
    setExtractText('');
    setExtractImage(null);
    setListPickByIdx({});
    setAddedPlaces({});
    setSelectedPlaceKeys({});
    setNewListName('');
    setExtractEntry('links');
  };
  useEffect(() => {
    if (!userLists || userLists.length === 0) {
      setBulkImportListId('');
      return;
    }
    setBulkImportListId((prev) => {
      if (prev && userLists.some((l) => l && l.id === prev)) return prev;
      const first = userLists.find((l) => l && l.id);
      return first ? first.id : '';
    });
  }, [userLists]);

  const openExtract = (entry = 'links') => {
    resetExtractPanel();
    setExtractEntry(entry);
    setView('extract');
  };
  const openExtractFromScreenshots = () => {
    resetExtractPanel();
    setExtractEntry('screenshots');
    setView('extract');
    extractFileInputRef.current && extractFileInputRef.current.click();
  };
  const openSocialTiktokSearch = () => {
    setTiktokSearchQuery('');
    setView('socialTiktok');
  };
  const openTikTokSearchInBrowser = (override) => {
    const query =
      override != null && String(override).trim() !== ''
        ? String(override).trim()
        : tiktokSearchQuery.trim();
    const term = query || 'travel';
    window.open(`https://www.tiktok.com/search?q=${encodeURIComponent(term)}`, '_blank', 'noopener,noreferrer');
  };
  const goFromSocialToPasteLink = () => {
    resetExtractPanel();
    setExtractEntry('links');
    setView('extract');
  };
  const onExtractImageChosen = (e) => {
    const f = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!f) return;
    const mimeOk = /^image\/(png|jpeg|webp)$/i.test(f.type);
    const extOk = /\.(png|jpe?g|webp)$/i.test(f.name);
    if (!mimeOk && !extOk) {
      setExtractErr('Choose a PNG, JPEG, or WebP file from Files (not a text or other document).');
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      if (typeof dataUrl !== 'string') return;
      const comma = dataUrl.indexOf(',');
      const base64 = comma >= 0 ? dataUrl.slice(comma + 1) : dataUrl;
      const mime = (f.type && f.type.startsWith('image/')) ? f.type : 'image/png';
      setExtractImage({ preview: dataUrl, base64, mime, name: f.name });
      setExtractErr('');
    };
    reader.onerror = () => setExtractErr('Could not read that file. Try another image.');
    reader.readAsDataURL(f);
  };
  const runExtract = async () => {
    const pasted = extractText.trim();
    if (!extractImage && !pasted) {
      setExtractErr('Paste a link or notes, or choose a PNG / JPEG / WebP image.');
      return;
    }
    const linkForJob = firstUrlInText(pasted) || '';
    if (!extractImage && linkForJob && useReelJobPipelineForUrl(linkForJob)) {
      setExtractLoading(true);
      setExtractErr('');
      try {
        const { job_id: jid } = await apiFetchJson('/api/jobs', {
          method: 'POST',
          body: JSON.stringify({ url: pasted }),
        });
        const job = await pollReelExtractionJob(jid);
        setExtractJson(job.result.extract);
        setExtractMeta(job.result || null);
        setShowImportReview(true);
        setListPickByIdx({});
        setAddedPlaces({});
        const p = pickPlacesFromExtract(job.result.extract);
        const picked = {};
        p.places.forEach((place, idx) => {
          picked[`${idx}-${place.name}`] = true;
        });
        setSelectedPlaceKeys(picked);
      } catch (e) {
        setExtractErr(e?.message || String(e));
      } finally {
        setExtractLoading(false);
      }
      return;
    }
    setExtractLoading(true);
    setExtractErr('');
    try {
      let body;
      if (extractImage) {
        body = {
          posts: [
            {
              post_id: 'addspots-' + Date.now(),
              url: 'https://deepdive.app/image-upload',
              platform: 'other',
              caption: '',
              transcript: '',
              ocr_text: '',
              thumbnail_text: '',
              raw_text: pasted,
              image_base64: extractImage.base64,
              image_mime_type: extractImage.mime,
            },
          ],
        };
      } else {
        const link = firstUrlInText(pasted) || 'https://deepdive.app/import';
        const platform = inferSocialPlatformFromUrl(link);
        body = {
          posts: [
            {
              post_id: 'addspots-' + Date.now(),
              url: link,
              platform,
              caption: '',
              transcript: '',
              ocr_text: '',
              thumbnail_text: '',
              raw_text: pasted || 'scuba diving travel inspiration',
            },
          ],
        };
      }
      const data = await apiFetchJson('/extract', {
        method: 'POST',
        body: JSON.stringify(body),
      });
      setExtractJson(data);
      setExtractMeta({ source: { url: firstUrlInText(pasted) || '', thumbnail_url: extractImage?.preview || null } });
      /* Same as reel job path: review-first UI hides the paste form so saves (map / list / map+list) do not jump back to “paste your link”. */
      setShowImportReview(true);
      setListPickByIdx({});
      setAddedPlaces({});
      const p = pickPlacesFromExtract(data);
      const picked = {};
      p.places.forEach((place, idx) => {
        picked[`${idx}-${place.name}`] = true;
      });
      setSelectedPlaceKeys(picked);
    } catch (e) {
      setExtractErr(e?.message || String(e));
    } finally {
      setExtractLoading(false);
    }
  };

  const extractPlacesInfo = extractJson ? pickPlacesFromExtract(extractJson) : { places: [], destinationHint: '' };
  const placePayload = (place) => ({
    name: place.name,
    destinationHint: extractPlacesInfo.destinationHint || '',
    lat: place.lat,
    lng: place.lng,
    google_place_id: place.google_place_id,
    formatted_address: place.formatted_address,
  });
  /** Per-row list override, else first saved list. */
  const effectiveListIdForRow = (idx) => {
    const row = listPickByIdx[idx];
    if (row !== undefined && row !== '') return row;
    return bulkImportListId || userLists.find((l) => l && l.id)?.id || '';
  };
  const sourceThumb =
    extractMeta?.source?.thumbnail_url ||
    (extractImage && extractImage.preview) ||
    null;
  const sourceUrl = extractMeta?.source?.url || '';
  /** Selected rows with index so bulk list/map actions use each row’s list dropdown (falls back to bulk list). */
  const selectedPlaceRows = extractPlacesInfo.places
    .map((place, idx) => ({ place, idx }))
    .filter(({ place, idx }) => selectedPlaceKeys[`${idx}-${place.name}`]);
  const selectedPlaces = selectedPlaceRows.map((r) => r.place);
  const togglePlacePicked = (key) => setSelectedPlaceKeys((s) => ({ ...s, [key]: !s[key] }));
  const toggleAllPicked = () => {
    const keys = extractPlacesInfo.places.map((place, idx) => `${idx}-${place.name}`);
    const allOn = keys.length > 0 && keys.every((k) => selectedPlaceKeys[k]);
    const next = {};
    keys.forEach((k) => { next[k] = !allOn; });
    setSelectedPlaceKeys(next);
  };
  const bumpAddedForSelected = (mode) => {
    setAddedPlaces((a) => {
      const next = { ...a };
      extractPlacesInfo.places.forEach((p, idx) => {
        const k = `${idx}-${p.name}`;
        if (!selectedPlaceKeys[k]) return;
        const prev = a[k];
        if (mode === 'map') {
          next[k] = prev === 'list' || prev === 'both' ? 'both' : 'map';
        } else if (mode === 'list') {
          next[k] = prev === 'map' || prev === 'both' ? 'both' : 'list';
        } else {
          next[k] = 'both';
        }
      });
      return next;
    });
  };

  const saveSelectedToMap = () => {
    if (selectedPlaces.length === 0) return;
    selectedPlaces.forEach((place) => onAddPlaceToMap(placePayload(place)));
    bumpAddedForSelected('map');
  };
  const saveSelectedToList = () => {
    if (selectedPlaceRows.length === 0 || userLists.length === 0) return;
    selectedPlaceRows.forEach(({ place, idx }) => {
      const listId = effectiveListIdForRow(idx);
      if (!listId) return;
      const listMeta = userLists.find((l) => l && l.id === listId);
      if (!listMeta) return;
      onAddPlaceToList(placePayload(place), listId, listMeta);
    });
    bumpAddedForSelected('list');
  };
  /** Add every selected place to the map and that row’s chosen list (per-row dropdown, else bulk list). */
  const saveSelectedMapAndList = () => {
    if (selectedPlaceRows.length === 0 || userLists.length === 0) return;
    selectedPlaceRows.forEach(({ place, idx }) => {
      const listId = effectiveListIdForRow(idx);
      if (!listId) return;
      const listMeta = userLists.find((l) => l && l.id === listId);
      if (!listMeta) return;
      const payload = placePayload(place);
      onAddPlaceToMap(payload);
      onAddPlaceToList(payload, listId, listMeta, { skipMapPing: true });
    });
    bumpAddedForSelected('both');
  };
  const createListAndSave = () => {
    const nm = newListName.trim();
    if (!nm || selectedPlaces.length === 0) return;
    const id = onCreateList(nm);
    if (id) {
      const meta = { id, name: nm, icon: '📋', color: C.biolume };
      selectedPlaces.forEach((place) => {
        const payload = placePayload(place);
        onAddPlaceToList(payload, id, meta, { skipMapPing: true });
        onAddPlaceToMap(payload);
      });
      bumpAddedForSelected('both');
      setNewListName('');
    }
  };

  const row0 = extractJson?.results?.[0] || null;
  const sourceCaption = String(
    extractMeta?.source?.caption ||
      extractMeta?.source?.description ||
      extractMeta?.source?.title ||
      '',
  ).trim();
  const sourceAuthor = String(extractMeta?.source?.author || '').trim();
  const sourcePlatformLabel = (() => {
    const u = String(sourceUrl || '').toLowerCase();
    if (u.includes('instagram.com') || u.includes('instagr.am')) return 'Instagram';
    if (u.includes('tiktok.com') || u.includes('vm.tiktok.com') || u.includes('vt.tiktok.com')) return 'TikTok';
    if (u.includes('google.') && u.includes('maps')) return 'Google Maps';
    return 'Video';
  })();
  const sourceCaptionPreview = (() => {
    const t = sourceCaption || String(row0?.notes || '').trim();
    if (!t) return '';
    const max = 140;
    return t.length > max ? `${t.slice(0, max)}…` : t;
  })();
  const importBannerTone = (() => {
    const fr = String(row0?.failure_reason || '');
    if (fr === 'instagram_access_blocked' || fr === 'video_download_failed' || fr === 'places_unavailable') return 'warn';
    if (fr === 'places_no_match' || fr === 'no_location_signal') return 'info';
    return 'ok';
  })();

  const cardBase = {
    padding:'18px',borderRadius:18,textAlign:'left',cursor:'pointer',
    background:C.glass,border:`1px solid ${C.glassBd}`,transition:'all 0.25s',
    backdropFilter:'blur(12px)',
  };
  const hoverIn = e => {
    e.currentTarget.style.border=`1px solid ${C.biolume}`;
    e.currentTarget.style.background='rgba(0,229,212,0.08)';
    e.currentTarget.style.boxShadow='0 0 24px rgba(0,229,212,0.18)';
    e.currentTarget.style.transform='translateY(-2px)';
  };
  const hoverOut = e => {
    e.currentTarget.style.border=`1px solid ${C.glassBd}`;
    e.currentTarget.style.background=C.glass;
    e.currentTarget.style.boxShadow='none';
    e.currentTarget.style.transform='none';
  };
  const titleStyle = {color:'white',fontWeight:800,fontSize:15,marginBottom:4};
  const subStyle = {color:C.textSec,fontSize:12,lineHeight:1.4};

  return (
    <>
      <input
        ref={extractFileInputRef}
        type="file"
        accept="image/png,image/jpeg,image/webp,.png,.jpg,.jpeg,.webp"
        data-testid="addspots-extract-file"
        style={{display:'none'}}
        onChange={onExtractImageChosen}
      />
      {view === 'extract' ? (
      <div style={{
        padding:'24px 20px',
        background: reviewLight ? '#f3f4f6' : `linear-gradient(180deg,${C.navy},${C.deep})`,
        height:'100%',
        display:'flex',flexDirection:'column',overflowY:'auto',
      }}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <button type="button" data-testid="addspots-extract-back" onClick={()=>{ resetExtractPanel(); setView('grid'); }}
            style={{
              color: reviewLight ? '#111827' : C.biolume,
              fontSize:14,fontWeight:800,background:'none',border:'none',cursor:'pointer',
            }}>
            ← Back
          </button>
          <button type="button" data-testid="addspots-close" onClick={onClose}
            style={{
              width:32,height:32,borderRadius:'50%',
              background: reviewLight ? '#ffffff' : C.glass,
              border:`1px solid ${reviewLight ? 'rgba(17,24,39,0.12)' : C.glassBd}`,
              color: reviewLight ? '#6b7280' : C.textSec,
              fontSize:18,cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',
            }}>✕</button>
        </div>
        {!showImportReview ? (
          <>
        <h3 style={{color: reviewLight ? '#111827' : 'white',fontSize:18,fontWeight:900,marginBottom:8}}>
          {extractEntry === 'notes' ? 'Paste your list' : 'Analyze text or image'}
        </h3>
        {extractEntry === 'notes' ? (
          <p style={{color: reviewLight ? '#4b5563' : C.textSec,fontSize:13,marginBottom:12,lineHeight:1.5}}>
            Paste your list, bullets, or any notes about places you want to save. The AI reads plain text here—no TikTok or Instagram link required. When you’re done, use <strong style={{color: reviewLight ? '#111827' : 'white'}}>Run AI extract</strong> to pull out spots for your lists and map.
          </p>
        ) : extractEntry === 'screenshots' ? (
          <p style={{color: reviewLight ? '#4b5563' : C.textSec,fontSize:13,marginBottom:12,lineHeight:1.5}}>
            Use <strong style={{color: reviewLight ? '#111827' : 'white'}}>Choose image</strong> to pick a <strong style={{color: reviewLight ? '#111827' : 'white'}}>PNG, JPEG, or WebP</strong> from Files, or add optional notes below. Images are sent to Gemini vision for place cues.
          </p>
        ) : (
          <p style={{color: reviewLight ? '#4b5563' : C.textSec,fontSize:13,marginBottom:12,lineHeight:1.5}}>
            Paste a TikTok or Instagram reel URL, or a Google Maps link — the server runs the{' '}
            <strong style={{color: reviewLight ? '#111827' : 'white'}}>reel-to-map</strong> job (download + Gemini video + Places when configured), which can take up to a couple of minutes. Or use{' '}
            <strong style={{color: reviewLight ? '#111827' : 'white'}}>Choose image</strong> for a <strong style={{color: reviewLight ? '#111827' : 'white'}}>PNG, JPEG, or WebP</strong> for instant vision extract. Plain notes without a social/Maps URL still use the fast <code style={{color: reviewLight ? '#0d9488' : C.biolume,fontSize:11}}>/extract</code> path.
          </p>
        )}
        <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:12}}>
          <button
            type="button"
            data-testid="addspots-extract-choose-image"
            onClick={() => extractFileInputRef.current && extractFileInputRef.current.click()}
            style={{
              padding:'10px 14px',borderRadius:12,fontWeight:800,fontSize:13,
              background: reviewLight ? 'rgba(37,99,235,0.12)' : 'rgba(96,165,250,0.2)',
              border: reviewLight ? '1px solid rgba(37,99,235,0.35)' : '1px solid rgba(96,165,250,0.5)',
              color: reviewLight ? '#1d4ed8' : '#bfdbfe',
              cursor:'pointer',
            }}
          >Choose image (PNG / JPEG / WebP)</button>
          {extractImage ? (
            <button type="button" onClick={()=>setExtractImage(null)}
              style={{padding:'10px 14px',borderRadius:12,fontWeight:700,fontSize:12,
                background: reviewLight ? '#ffffff' : C.glass,
                border: reviewLight ? '1px solid rgba(17,24,39,0.12)' : `1px solid ${C.glassBd}`,
                color: reviewLight ? '#6b7280' : C.textSec,cursor:'pointer'}}>Remove image</button>
          ) : null}
        </div>
        {extractImage ? (
          <div style={{marginBottom:12,padding:12,borderRadius:14,
            background: reviewLight ? '#ffffff' : C.glass,
            border: reviewLight ? '1px solid rgba(17,24,39,0.1)' : `1px solid ${C.glassBd}`}}>
            <div style={{fontSize:11,color: reviewLight ? '#0d9488' : C.biolume,fontWeight:800,marginBottom:8}}>Image preview</div>
            <img src={extractImage.preview} alt="" style={{maxWidth:'100%',maxHeight:180,borderRadius:10,objectFit:'contain'}} />
            <div style={{fontSize:10,color: reviewLight ? '#9ca3af' : C.textMut,marginTop:6}}>{extractImage.name}</div>
          </div>
        ) : null}
        <textarea data-testid="addspots-extract-input" value={extractText} onChange={(e)=>setExtractText(e.target.value)}
          placeholder={extractEntry === 'notes' ? 'e.g. • Manta Point\n• Crystal Bay\n• Cafés in Canggu…' : 'e.g. Best reefs in Raja Ampat for macro…'}
          style={{width:'100%',minHeight:120,padding:14,borderRadius:14,
            background: reviewLight ? '#ffffff' : 'rgba(255,255,255,0.07)',
            border: reviewLight ? '1px solid rgba(17,24,39,0.15)' : `1px solid ${C.glassBd}`,
            color: reviewLight ? '#111827' : 'white',fontSize:14,resize:'vertical',boxSizing:'border-box',fontFamily:'inherit'}}/>
        <button type="button" data-testid="addspots-extract-submit" disabled={extractLoading} onClick={runExtract}
          style={{marginTop:14,width:'100%',padding:14,borderRadius:14,fontWeight:800,
            background:`linear-gradient(135deg,${C.biolume},#00a0e9)`,color:C.deep,border:'none',
            cursor:extractLoading?'wait':'pointer',opacity:extractLoading?0.7:1}}>
          {extractLoading ? 'Analyzing…' : 'Run AI extract'}
        </button>
          </>
        ) : (
          <div style={{marginBottom:12,textAlign:'center'}}>
            <h3 style={{color: reviewLight ? '#111827' : 'white',fontSize:20,fontWeight:900,marginBottom:6}}>Import Locations</h3>
            <p style={{color: reviewLight ? '#6b7280' : C.textSec,fontSize:13,lineHeight:1.5,marginBottom:0}}>
              Review matches before saving to your map or lists.
            </p>
          </div>
        )}
        {extractErr && (
          <div data-testid="addspots-extract-error" style={{
            marginTop:12,padding:12,borderRadius:12,fontSize:12,fontWeight:700,
            background: reviewLight ? '#fff1f2' : 'rgba(255,110,122,0.12)',
            border: reviewLight ? '1px solid rgba(244,63,94,0.25)' : 'none',
            color: reviewLight ? '#9f1239' : '#ffb3bc',
          }}>{extractErr}</div>
        )}
        {extractJson && (
          <div data-testid="addspots-extract-result" style={{marginTop:14}}>
            {!showImportReview ? (
              <ExtractInsightsSummary row={extractJson?.results?.[0]} variant={reviewLight ? 'light' : 'dark'} />
            ) : (
              <details style={{marginBottom:12}}>
                <summary style={{color: reviewLight ? '#6b7280' : C.textSec,fontSize:12,cursor:'pointer',fontWeight:700}}>AI details</summary>
                <div style={{marginTop:10}}>
                  <ExtractInsightsSummary row={extractJson?.results?.[0]} variant={reviewLight ? 'light' : 'dark'} />
                </div>
              </details>
            )}
            {(sourceThumb || sourceUrl) ? (
              <div style={{
                marginBottom:12,
                padding:14,
                borderRadius:16,
                background: sourceReviewDark ? C.glassCard : '#ffffff',
                border: sourceReviewDark ? `1px solid ${C.glassBd}` : '1px solid rgba(17,24,39,0.08)',
                boxShadow: sourceReviewDark ? '0 12px 40px rgba(0,0,0,0.35)' : '0 10px 30px rgba(17,24,39,0.08)',
              }}>
                <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                  <div style={{position:'relative',width:76,height:76,flexShrink:0}}>
                    {sourceThumb ? (
                      <ThumbImg src={sourceThumb} alt="" style={{
                        width:76,height:76,borderRadius:14,objectFit:'cover',
                        border: sourceReviewDark ? `1px solid ${C.glassBd}` : '1px solid rgba(17,24,39,0.08)',
                      }} />
                    ) : (
                      <div style={{
                        width:76,height:76,borderRadius:14,
                        background: sourceReviewDark ? 'rgba(255,255,255,0.06)' : '#f3f4f6',
                        border: sourceReviewDark ? `1px solid ${C.glassBd}` : '1px solid rgba(17,24,39,0.08)',
                        display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,
                      }}>🎬</div>
                    )}
                    {extractPlacesInfo.places.length > 0 ? (
                      <div style={{
                        position:'absolute',right:-6,bottom:-6,
                        padding:'4px 8px',borderRadius:999,
                        background: sourceReviewDark ? C.biolume : '#111827',
                        color: sourceReviewDark ? C.deep : '#ffffff',fontSize:10,fontWeight:900,
                        border: sourceReviewDark ? `2px solid ${C.deep}` : '2px solid #ffffff',
                      }}>
                        {extractPlacesInfo.places.length} {extractPlacesInfo.places.length === 1 ? 'Spot' : 'Spots'}
                      </div>
                    ) : null}
                  </div>
                  <div style={{minWidth:0,flex:1}}>
                    <div style={{color: sourceReviewDark ? 'white' : '#111827',fontSize:13,fontWeight:800,lineHeight:1.35,marginBottom:6}}>
                      {sourceCaptionPreview || 'Imported reel'}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,color: sourceReviewDark ? C.textSec : '#6b7280',fontSize:12,fontWeight:700}}>
                      <span style={{display:'inline-flex',alignItems:'center',gap:6}}>
                        <span aria-hidden="true">📌</span>
                        Saved from {sourcePlatformLabel}
                      </span>
                      {sourceAuthor ? <span style={{color: sourceReviewDark ? C.textMut : '#9ca3af',fontWeight:600}}>· {sourceAuthor}</span> : null}
                    </div>
                    {sourceUrl ? (
                      <div style={{marginTop:8,color: sourceReviewDark ? C.textMut : '#9ca3af',fontSize:11,wordBreak:'break-all'}}>{sourceUrl}</div>
                    ) : null}
                  </div>
                </div>
              </div>
            ) : null}
            {extractPlacesInfo.places.length === 0 ? (
              <div style={{
                padding:14,borderRadius:16,
                background: sourceReviewDark ? C.glassCard : '#ffffff',
                border: sourceReviewDark ? `1px solid ${C.glassBd}` : '1px solid rgba(17,24,39,0.08)',
                color: sourceReviewDark ? C.textSec : '#6b7280',fontSize:13,

/* ─── LIST DETAIL (dynamic from savedSpots + list) ─── */
function pickLocChipLabel(spot) {
  const parts = String(spot.loc || '')
    .split(',')
    .map((x) => x.trim())
    .filter(Boolean);
  if (parts.length === 0) return 'Unknown';
  if (parts.length === 1) {
    const a = parts[0];
    return a.length > 26 ? `${a.slice(0, 24)}…` : a;
  }
  const mid = parts.length >= 3 ? parts[parts.length - 2] : parts[parts.length - 1];
  return mid.length > 28 ? `${mid.slice(0, 26)}…` : mid;
}

function inferSpotCategory(spot) {
  const t = `${spot.name || ''} ${spot.loc || ''}`.toLowerCase();
  if (
    /museum|gallery|monument|castle|temple|attraction|park|zoo|aquarium|heritage|histor|viewpoint|landmark|village|plage|beach|coast|bay/i.test(
      t,
    )
  ) {
    return 'Attractions';
  }
  if (/restaurant|cafe|coffee|bar|food|dining|meal|bakery|bistro|grill|pub/i.test(t)) return 'Food';
  return 'Other';
}

function ListDetailView({ list, savedSpots, onBack, onAddSpots }) {
  const [locKey, setLocKey] = useState(null);
  const [catFilter, setCatFilter] = useState('All');
  const [searchQ, setSearchQ] = useState('');

  const spotsInList = useMemo(
    () => (savedSpots || []).filter((s) => s.listId === list.id),
    [savedSpots, list.id],
  );

  useEffect(() => {
    setLocKey(null);
    setCatFilter('All');
    setSearchQ('');
  }, [list.id]);

  const locGroups = useMemo(() => {
    const m = {};
    spotsInList.forEach((s) => {
      const k = pickLocChipLabel(s);
      m[k] = (m[k] || 0) + 1;
    });
    return Object.entries(m).sort((a, b) => b[1] - a[1]);
  }, [spotsInList]);

  const categoryCounts = useMemo(() => {
    const m = {};
    spotsInList.forEach((s) => {
      const c = inferSpotCategory(s);
      m[c] = (m[c] || 0) + 1;
    });
    return m;
  }, [spotsInList]);

  const categoryKeys = useMemo(() => Object.keys(categoryCounts).sort(), [categoryCounts]);

  const filtered = useMemo(() => {
    const q = searchQ.trim().toLowerCase();
    return spotsInList.filter((s) => {
      if (locKey != null && pickLocChipLabel(s) !== locKey) return false;
      if (catFilter !== 'All' && inferSpotCategory(s) !== catFilter) return false;
      if (q) {
        const hay = `${s.name || ''} ${s.loc || ''}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [spotsInList, locKey, catFilter, searchQ]);

  const shareList = () => {
