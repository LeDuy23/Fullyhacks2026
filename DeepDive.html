<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepDive — Explore the Deep</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<!-- Load config.js to set window.GOOGLE_MAPS_API_KEY before this tag -->

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>

html,body,#root{width:100%;height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:#04080f;}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.03)}
::-webkit-scrollbar-thumb{background:rgba(0,229,212,0.3);border-radius:99px}
input{font-family:'Nunito',sans-serif}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;background:none}

.gm-style .gm-style-cc{display:none}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── COLOR TOKENS ─── */
const C = {
  depth:'#04080f', deep:'#060e1c', navy:'#0a1628', ocean:'#0d2040',
  mid:'#103060', biolume:'#00e5d4', biolumeB:'#00fff2', coral:'#ff6e7a',
  amber:'#ffb84d', seafoam:'#6fd8be', text:'#ffffff',
  textSec:'rgba(255,255,255,0.65)', textMut:'rgba(255,255,255,0.35)',
  glass:'rgba(255,255,255,0.06)', glassBr:'rgba(255,255,255,0.1)',
  glassBd:'rgba(255,255,255,0.13)', glassCard:'rgba(8,22,50,0.7)',

/* ─── MASCOT SVGs ─── */
function OllieOctopus({size=120, expression='happy', hat=true}) {
  return (
    <svg width={size} height={size*1.1} viewBox="0 0 100 110" fill="none">
      {hat && <>
        <ellipse cx="50" cy="28" rx="22" ry="5" fill="#0a2a3a" opacity="0.6"/>
        <rect x="32" y="10" width="36" height="20" rx="4" fill="#0d3d52"/>
        <rect x="28" y="28" width="44" height="6" rx="3" fill="#0d4a60"/>
        <rect x="43" y="8" width="14" height="4" rx="2" fill="#00e5d4"/>
      </>}
      <ellipse cx="50" cy="52" rx="26" ry="24" fill="url(#olliebody)"/>
      <ellipse cx="50" cy="52" rx="26" ry="24" fill="url(#ollieglow)" opacity="0.3"/>
      <circle cx="42" cy="48" r="7" fill="white"/>
      <circle cx="58" cy="48" r="7" fill="white"/>
      <circle cx="43.5" cy="48.5" r="4" fill="#0a1628"/>
      <circle cx="59.5" cy="48.5" r="4" fill="#0a1628"/>
      <circle cx="45" cy="47" r="1.5" fill="white"/>
      <circle cx="61" cy="47" r="1.5" fill="white"/>
      {expression==='happy' && <path d="M43 57 Q50 63 57 57" stroke="#0a1628" strokeWidth="2" strokeLinecap="round" fill="none"/>}
      {expression==='excited' && <path d="M42 57 Q50 65 58 57" stroke="#0a1628" strokeWidth="2.5" strokeLinecap="round" fill="none"/>}
      {expression==='thinking' && <path d="M44 58 Q50 61 56 58" stroke="#0a1628" strokeWidth="2" strokeLinecap="round" fill="none"/>}
      {[[-20,0],[-14,8],[-6,14],[4,16],[14,14],[22,8],[26,0],[20,-6]].map(([dx,dy],i)=>(
        <path key={i} d={`M${50+dx*0.3} ${70+dy*0.2} Q${50+dx*0.8} ${80+dy} ${50+dx} ${95+dy*0.5}`}
          stroke="url(#tentaGrad)" strokeWidth="5" strokeLinecap="round" fill="none" opacity="0.9"/>
      ))}
      <defs>
        <radialGradient id="olliebody" cx="40%" cy="35%">
          <stop offset="0%" stopColor="#3a7bd5"/><stop offset="100%" stopColor="#1a3a8a"/>
        </radialGradient>
        <radialGradient id="ollieglow" cx="50%" cy="50%">
          <stop offset="0%" stopColor="#00e5d4"/><stop offset="100%" stopColor="transparent"/>
        </radialGradient>
        <linearGradient id="tentaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#2a5bc4"/><stop offset="100%" stopColor="#1a2a6a"/>
        </linearGradient>
      </defs>
    </svg>
  );
}

function FinnShark({size=100}) {

      <path d="M55 35 L62 10 L72 38Z" fill="#8ab4cc"/>
      <path d="M80 50 Q95 45 90 55Z" fill="#8ab4cc"/>
      <path d="M30 72 L22 82 L40 72Z" fill="#8ab4cc"/>
      <path d="M55 72 L50 82 L65 72Z" fill="#8ab4cc"/>
      <circle cx="75" cy="47" r="6" fill="white"/>
      <circle cx="76.5" cy="47.5" r="3.5" fill="#0a1628"/>
      <circle cx="77.5" cy="46.5" r="1" fill="white"/>
      <path d="M68 57 Q75 63 82 57" stroke="white" strokeWidth="2" strokeLinecap="round" fill="none"/>
      <path d="M70 60 L68 57 L72 58" fill="white"/>
      <path d="M80 60 L82 57 L78 58" fill="white"/>

        <linearGradient id="sharkbody" x1="0%" y1="0%" x2="100%" y2="100%">

        </linearGradient>

}

function CoralFish({size=90}) {
  return (
    <svg width={size} height={size*0.85} viewBox="0 0 90 76" fill="none">
      <ellipse cx="44" cy="40" rx="28" ry="22" fill="#ff7043"/>
      <path d="M16 40 L2 25 L5 40 L2 55Z" fill="#ff7043"/>
      <ellipse cx="44" cy="40" rx="28" ry="22" fill="none" stroke="white" strokeWidth="4"/>
      <line x1="44" y1="18" x2="44" y2="62" stroke="white" strokeWidth="4"/>
      <ellipse cx="62" cy="35" rx="7" ry="10" fill="#ff5722" opacity="0.7" transform="rotate(20,62,35)"/>
      <ellipse cx="64" cy="48" rx="7" ry="10" fill="#ff5722" opacity="0.7" transform="rotate(-20,64,48)"/>
      <circle cx="62" cy="35" r="8" fill="white"/>
      <circle cx="63.5" cy="35" r="5" fill="#0a1628"/>
      <circle cx="65" cy="33.5" r="1.5" fill="white"/>
      <path d="M57 43 Q63 48 68 43" stroke="#0a1628" strokeWidth="1.5" strokeLinecap="round" fill="none"/>

function PearlPuffer({size=90}) {
  return (
    <svg width={size} height={size} viewBox="0 0 90 90" fill="none">
      <circle cx="45" cy="48" r="30" fill="url(#puffbody)"/>
      {[0,30,60,90,120,150,180,210,240,270,300,330].map((a,i)=>(
        <ellipse key={i} cx={45+28*Math.cos(a*Math.PI/180)} cy={48+28*Math.sin(a*Math.PI/180)} rx="5" ry="4"
          fill="#e8a030" transform={`rotate(${a},${45+28*Math.cos(a*Math.PI/180)},${48+28*Math.sin(a*Math.PI/180)})`}/>
      ))}
      <circle cx="37" cy="42" r="8" fill="white"/>
      <circle cx="53" cy="42" r="8" fill="white"/>
      <circle cx="38" cy="43" r="5" fill="#0a1628"/>
      <circle cx="54" cy="43" r="5" fill="#0a1628"/>
      <circle cx="39.5" cy="41.5" r="1.5" fill="white"/>
      <circle cx="55.5" cy="41.5" r="1.5" fill="white"/>
      <path d="M39 53 Q45 58 51 53" stroke="#0a1628" strokeWidth="2" strokeLinecap="round" fill="none"/>
      <ellipse cx="20" cy="50" rx="10" ry="6" fill="#e8a030" opacity="0.8" transform="rotate(-20,20,50)"/>
      <ellipse cx="70" cy="50" rx="10" ry="6" fill="#e8a030" opacity="0.8" transform="rotate(20,70,50)"/>
      <ellipse cx="45" cy="18" rx="8" ry="6" fill="#e8a030" opacity="0.8"/>
      <defs>
        <radialGradient id="puffbody" cx="40%" cy="35%">
          <stop offset="0%" stopColor="#ffd060"/><stop offset="100%" stopColor="#e8820a"/>
        </radialGradient>
      </defs>
    </svg>
  );
}

function SeahorseGuide({size=80}) {
  return (
    <svg width={size} height={size*1.4} viewBox="0 0 80 112" fill="none">
      <path d="M40 20 Q55 22 52 35 Q60 38 58 50 Q58 65 48 75 Q40 82 38 95 Q36 105 40 110" stroke="url(#seahorseGrad)" strokeWidth="10" strokeLinecap="round" fill="none"/>
      <circle cx="40" cy="18" r="13" fill="url(#seahorseHead)"/>
      <path d="M40 6 Q48 2 50 8" stroke="#4a90d9" strokeWidth="3" strokeLinecap="round" fill="none"/>
      <circle cx="35" cy="15" r="4" fill="white"/>
      <circle cx="35.5" cy="15.5" r="2.5" fill="#0a1628"/>
      <circle cx="36.5" cy="14.5" r="0.8" fill="white"/>
      <path d="M37 23 Q40 26 43 24" stroke="#0a1628" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
      {[35,45,55,65,75,85].map((y,i)=>(
        <path key={i} d={`M${44+i*0.5} ${y} Q${58+i} ${y-4} ${56+i} ${y+4}`} stroke="#4a90d9" strokeWidth="3" strokeLinecap="round" fill="none" opacity="0.8"/>
      ))}
      <defs>
        <linearGradient id="seahorseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#4a90d9"/><stop offset="100%" stopColor="#1a3a8a"/>
        </linearGradient>
        <radialGradient id="seahorseHead" cx="40%" cy="40%">
          <stop offset="0%" stopColor="#5a9de8"/><stop offset="100%" stopColor="#2a5ab0"/>
        </radialGradient>
      </defs>
    </svg>
  );
}

/* ─── GOOGLE MAPS ─── */
function OceanMap({ mapRef: externalMapRef, onMarkerClick }) {
  const containerRef = useRef(null);
  const mapInstance = useRef(null);

  useEffect(() => {
    if (!containerRef.current || mapInstance.current) return;

    const map = new google.maps.Map(containerRef.current, {
      center: { lat: 20, lng: 10 },
      zoom: 2,
      disableDefaultUI: true,
      zoomControl: true,
      zoomControlOptions: { position: google.maps.ControlPosition.BOTTOM_RIGHT },
      gestureHandling: 'greedy',
    });

    const makeIcon = (color) => ({
      path: google.maps.SymbolPath.CIRCLE,
      scale: 8,
      fillColor: color || '#a78bfa',
      fillOpacity: 1,
      strokeColor: 'white',
      strokeWeight: 2,
    });

    [
      [13.5, 123.8, 'Coral Triangle', 1],
      [4.2, 73.5, 'Maldives', 3],
      [-18.3, 147.7, 'Great Barrier Reef', 2],
      [7.9, 134.5, 'Palawan', null],
      [-0.7, 130.9, 'Raja Ampat', null],
      [17.3, -87.5, 'Blue Hole', null],
    ].forEach(([lat, lng, name, tripId]) => {
      const marker = new google.maps.Marker({
        position: { lat, lng },
        map,
        icon: makeIcon('#a78bfa'),
        title: name,
      });

      if (tripId) {
        marker.addListener('click', () => {
          if (onMarkerClick) onMarkerClick(tripId);
        });
      } else {
        const info = new google.maps.InfoWindow({
          content: `<b style="color:#a78bfa;font-family:Nunito,sans-serif">${name}</b>`,
        });
        marker.addListener('click', () => info.open(map, marker));
      }
    });

    mapInstance.current = map;
    if (externalMapRef) externalMapRef.current = map;

    return () => {
      mapInstance.current = null;
      if (externalMapRef) externalMapRef.current = null;
    };
  }, []);

  return (
    <div ref={containerRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} />
  );
}

/* ─── MASCOT BUBBLE ─── */
function MascotBubble({mascot, message, style={}}) {
  const mascots = {
    ollie: <OllieOctopus size={72}/>,
    finn: <FinnShark size={70}/>,
    coral: <CoralFish size={68}/>,
    pearl: <PearlPuffer size={68}/>,
    seahorse: <SeahorseGuide size={60}/>,
  };
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:12,...style}}>
      <div style={{flexShrink:0}}>{mascots[mascot]||mascots.ollie}</div>
      <div style={{background:'rgba(13,40,80,0.95)',border:'1px solid rgba(0,229,212,0.3)',
        borderRadius:'18px 18px 18px 4px',padding:'10px 16px',backdropFilter:'blur(12px)',
        maxWidth:220,boxShadow:'0 0 20px rgba(0,229,212,0.15)'}}>
        <p style={{color:'white',fontSize:13,fontWeight:600,lineHeight:1.5,margin:0}}>{message}</p>
      </div>
    </div>
  );
}

/* ─── PROGRESS BAR ─── */
function ProgressBar({step, total}) {
  return (
    <div style={{display:'flex',gap:6,padding:'0 24px'}}>
      {Array.from({length:total}).map((_,i)=>(
        <div key={i} style={{flex:1,height:4,borderRadius:99,overflow:'hidden',background:'rgba(255,255,255,0.1)'}}>
          <div style={{width:i<step?'100%':'0%',height:'100%',
            background:'linear-gradient(90deg,#00e5d4,#00a8ff)',
            borderRadius:99,transition:'width 0.4s ease',boxShadow:'0 0 8px rgba(0,229,212,0.6)'}}/>
        </div>
      ))}
    </div>
  );
}

/* ─── ONBOARDING ─── */
function OnboardAgeScreen({onNext, onBack}) {
  const [sel, setSel] = useState(null);
  const opts = ['18–24','25–34','35–44','45–54','55+'];
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',padding:'24px 24px 32px',
      background:`linear-gradient(160deg,${C.deep},${C.navy})`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <button onClick={onBack} style={{color:C.textSec,fontSize:14,fontWeight:700}}>← Back</button>
        <ProgressBar step={1} total={3}/>
        <button style={{color:C.biolume,fontSize:14,fontWeight:700}}>Skip</button>
      </div>
      <MascotBubble mascot="ollie" message="Let me personalize your deep sea adventure! 🐙" style={{marginBottom:24}}/>
      <h2 style={{color:'white',fontSize:28,fontWeight:900,marginBottom:6}}>How old are you?</h2>
      <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>We'll tailor your exploration experience</p>
      <div style={{display:'flex',flexDirection:'column',gap:10,flex:1,overflowY:'auto'}}>
        {opts.map(o=>(
          <button key={o} onClick={()=>setSel(o)} style={{
            display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'16px 18px',borderRadius:16,textAlign:'left',
            background:sel===o?'rgba(0,229,212,0.12)':C.glass,
            border:`1.5px solid ${sel===o?C.biolume:C.glassBd}`,
            color:'white',fontSize:16,fontWeight:700,transition:'all 0.2s',
            boxShadow:sel===o?'0 0 20px rgba(0,229,212,0.2)':'none',cursor:'pointer',
          }}>
            <span>{o}</span>
            <div style={{width:22,height:22,borderRadius:'50%',border:`2px solid ${sel===o?C.biolume:C.glassBd}`,
              background:sel===o?C.biolume:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              {sel===o && <div style={{width:10,height:10,borderRadius:'50%',background:C.deep}}/>}
            </div>
          </button>
        ))}
      </div>
      <button onClick={()=>sel&&onNext()} style={{
        marginTop:20,padding:'16px',borderRadius:16,fontSize:16,fontWeight:800,
        background:sel?`linear-gradient(135deg,${C.biolume},#00a0e9)`:'rgba(255,255,255,0.1)',
        color:sel?C.deep:'rgba(255,255,255,0.3)',transition:'all 0.3s',
        boxShadow:sel?'0 0 30px rgba(0,229,212,0.4)':'none',cursor:sel?'pointer':'default',
      }}>Continue →</button>
    </div>
  );
}

function OnboardTripScreen({onNext, onBack}) {
  const [sel, setSel] = useState(null);
  const opts = [
    {id:'yes',icon:<FinnShark size={52}/>,title:"Yes, I have an expedition!",sub:"I'm ready to chart my course"},
    {id:'no',icon:<OllieOctopus size={52} hat={false}/>,title:"Not yet, just exploring",sub:"I'm discovering the depths"},
  ];
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',padding:'24px 24px 32px',
      background:`linear-gradient(160deg,${C.deep},${C.navy})`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <button onClick={onBack} style={{color:C.textSec,fontSize:14,fontWeight:700}}>← Back</button>
        <ProgressBar step={2} total={3}/>
        <button style={{color:C.biolume,fontSize:14,fontWeight:700}}>Skip</button>
      </div>
      <h2 style={{color:'white',fontSize:28,fontWeight:900,marginBottom:6}}>Do you have an adventure coming up?</h2>
      <p style={{color:C.textSec,fontSize:14,marginBottom:32}}>We'll personalize your experience 🌊</p>
      <div style={{display:'flex',flexDirection:'column',gap:14,flex:1}}>
        {opts.map(o=>(
          <button key={o.id} onClick={()=>setSel(o.id)} style={{
            display:'flex',alignItems:'center',gap:16,padding:'20px',borderRadius:20,textAlign:'left',
            background:sel===o.id?'rgba(0,229,212,0.1)':C.glass,
            border:`1.5px solid ${sel===o.id?C.biolume:C.glassBd}`,
            boxShadow:sel===o.id?'0 0 24px rgba(0,229,212,0.15)':'none',transition:'all 0.2s',cursor:'pointer',
          }}>
            <div style={{flexShrink:0}}>{o.icon}</div>
            <div style={{flex:1}}>
              <div style={{color:'white',fontSize:16,fontWeight:800}}>{o.title}</div>
              <div style={{color:C.textSec,fontSize:13,marginTop:3}}>{o.sub}</div>
            </div>
            <div style={{width:22,height:22,borderRadius:'50%',border:`2px solid ${sel===o.id?C.biolume:C.glassBd}`,
              background:sel===o.id?C.biolume:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              {sel===o.id && <div style={{width:10,height:10,borderRadius:'50%',background:C.deep}}/>}
            </div>
          </button>
        ))}
      </div>
      <button onClick={()=>sel&&onNext()} style={{
        padding:'16px',borderRadius:16,fontSize:16,fontWeight:800,
        background:sel?`linear-gradient(135deg,${C.biolume},#00a0e9)`:'rgba(255,255,255,0.1)',
        color:sel?C.deep:'rgba(255,255,255,0.3)',transition:'all 0.3s',
        boxShadow:sel?'0 0 30px rgba(0,229,212,0.4)':'none',cursor:sel?'pointer':'default',
      }}>Continue →</button>
    </div>
  );
}

function OnboardStyleScreen({onNext, onBack}) {
  const [sel, setSel] = useState(new Set());
  const opts = [
    {id:'pins',icon:<CoralFish size={48}/>,label:'Drop pins on the map',sub:'Mark your dive spots'},
    {id:'list',icon:<PearlPuffer size={48}/>,label:'Build a treasure list',sub:'Collect hidden gems'},
    {id:'guides',icon:<FinnShark size={48}/>,label:'Follow guide routes',sub:'Swim with the experts'},
    {id:'wing',icon:<SeahorseGuide size={48}/>,label:'I just drift with the current',sub:'Spontaneous explorer'},
  ];
  const toggle = (id) => setSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',padding:'24px 24px 32px',
      background:`linear-gradient(160deg,${C.deep},${C.navy})`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <button onClick={onBack} style={{color:C.textSec,fontSize:14,fontWeight:700}}>← Back</button>
        <ProgressBar step={3} total={3}/>
        <button style={{color:C.biolume,fontSize:14,fontWeight:700}}>Skip</button>
      </div>
      <h2 style={{color:'white',fontSize:28,fontWeight:900,marginBottom:6}}>How do you explore?</h2>

        {opts.map(o=>{

          return (
            <button key={o.id} onClick={()=>toggle(o.id)} style={{
              display:'flex',alignItems:'center',gap:14,padding:'14px 18px',borderRadius:16,textAlign:'left',
              background:on?'rgba(0,229,212,0.1)':C.glass,
              border:`1.5px solid ${on?C.biolume:C.glassBd}`,
              boxShadow:on?'0 0 20px rgba(0,229,212,0.15)':'none',transition:'all 0.2s',cursor:'pointer',
            }}>
              <div style={{flexShrink:0,width:56,height:48,display:'flex',alignItems:'center',justifyContent:'center'}}>{o.icon}</div>
              <div style={{flex:1}}>
                <div style={{color:'white',fontSize:15,fontWeight:800}}>{o.label}</div>
                <div style={{color:C.textSec,fontSize:12,marginTop:2}}>{o.sub}</div>
              </div>
              <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${on?C.biolume:C.glassBd}`,
                background:on?C.biolume:'none',display:'flex',alignItems:'center',justifyContent:'center',

            {dateFrom&&dateTo?`${fmt(dateFrom)} → ${fmt(dateTo)}`:dateFrom?`${fmt(dateFrom)} → …`:'Add dates'}
          </span>
        </div>
        {showCal && (() => {
          const y=calMonth.getFullYear(), m=calMonth.getMonth();
          const first=new Date(y,m,1).getDay();
          const days=new Date(y,m+1,0).getDate();
          const today=new Date(); today.setHours(0,0,0,0);
          const cells = [];
          for(let i=0;i<first;i++) cells.push(null);
          for(let d=1;d<=days;d++) cells.push(new Date(y,m,d));
          const pick = (d) => {
            if(!d||d<today) return;
            const t=d.getTime();
            if(!dateFrom||(dateFrom&&dateTo)){setDateFrom(t);setDateTo('');}
            else if(t<dateFrom){setDateFrom(t);}
            else{setDateTo(t);}
          };
          return (
            <div style={{marginTop:8,padding:'16px',borderRadius:14,background:C.glass,border:`1px solid ${C.glassBd}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

                <button onClick={()=>setCalMonth(new Date(y,m+1,1))} style={{background:'none',border:'none',color:C.biolume,fontSize:20,cursor:'pointer',padding:4}}>›</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
                {['S','M','T','W','T','F','S'].map((d,i)=>(
                  <div key={i} style={{textAlign:'center',color:C.textMut,fontSize:11,fontWeight:700,padding:'4px 0'}}>{d}</div>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
                {cells.map((d,i)=>{
                  if(!d) return <div key={i}/>;
                  const t=d.getTime();
                  const isPast=d<today;
                  const isFrom=dateFrom===t, isTo=dateTo===t;
                  const inRange=dateFrom&&dateTo&&t>dateFrom&&t<dateTo;
                  const selected=isFrom||isTo;
                  return (
                    <div key={i} onClick={()=>pick(d)} style={{
                      aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:13,fontWeight:selected?800:600,
                      color:isPast?C.textMut:selected?C.deep:inRange?C.biolume:'white',
                      background:selected?C.biolume:inRange?'rgba(0,229,212,0.15)':'transparent',
                      borderRadius:isFrom&&dateTo?'8px 0 0 8px':isTo?'0 8px 8px 0':inRange?'0':'8px',
                      cursor:isPast?'default':'pointer',opacity:isPast?0.35:1,transition:'all 0.15s',
                    }}>{d.getDate()}</div>
                  );
                })}
              </div>
              {(dateFrom||dateTo) && (
                <button onClick={()=>{setDateFrom('');setDateTo('');}} style={{
                  marginTop:10,width:'100%',padding:8,borderRadius:10,
                  background:'transparent',border:`1px solid ${C.glassBd}`,
                  color:C.textSec,fontSize:12,fontWeight:700,cursor:'pointer'}}>Clear dates</button>
              )}
            </div>
          );
        })()}
        {/* Interests */}
        <div style={{marginTop:12}}>
          <div style={{padding:'14px 16px',borderRadius:14,background:C.glass,border:`1px solid ${C.glassBd}`,
            display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',marginBottom:8}}>
            <span style={{color:'white',fontWeight:600}}>🎯 Preferences</span>
            <span style={{color:C.biolume,fontWeight:700,fontSize:14}}>Add interests</span>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {intOpts.map(i=>{
              const on=interests.has(i);
              return (
                <button key={i} onClick={()=>setInterests(s=>{const n=new Set(s);n.has(i)?n.delete(i):n.add(i);return n;})}
                  style={{padding:'7px 14px',borderRadius:99,fontSize:13,fontWeight:700,cursor:'pointer',transition:'all 0.2s',
                    background:on?C.biolume:C.glass,color:on?C.deep:'white',
                    border:`1px solid ${on?C.biolume:C.glassBd}`,
                    boxShadow:on?'0 0 12px rgba(0,229,212,0.3)':'none'}}>{i}</button>
              );
            })}
          </div>
        </div>
      </div>
      <div style={{padding:'16px 20px',borderTop:`1px solid ${C.glassBd}`}}>
        <button onClick={()=>dest&&onDone()} style={{
          width:'100%',padding:'16px',borderRadius:14,fontSize:16,fontWeight:800,cursor:'pointer',
          background:dest?`linear-gradient(135deg,${C.biolume},#00a0e9)`:'rgba(255,255,255,0.08)',
          color:dest?C.deep:'rgba(255,255,255,0.3)',border:'none',transition:'all 0.3s',
          boxShadow:dest?'0 0 30px rgba(0,229,212,0.35)':'none',
        }}>🗺️ Plan This Trip</button>
      </div>
    </div>
  );
}

function SpotsTab({onAddSpots}) {
  const [filter, setFilter] = useState('All');
  const [userLoc, setUserLoc] = useState(null);
  const [geoState, setGeoState] = useState('idle');

  const allSpots = [
    {name:'Coral Gardens',loc:'Raja Ampat',emoji:'🐠',color:'#ff6e7a',list:'Favorites',lat:-0.7,lng:130.9},
    {name:'Blue Hole',loc:'Belize',emoji:'🌀',color:'#00e5d4',list:'Bucket List',lat:17.3,lng:-87.5},
    {name:'Manta Point',loc:'Komodo',emoji:'🦈',color:'#6fd8be',list:'Favorites',lat:-8.6,lng:119.5},
    {name:'Cenote Dos Ojos',loc:'Mexico',emoji:'💧',color:'#a78bfa',list:'Bucket List',lat:20.3,lng:-87.4},
    {name:'SS Thistlegorm',loc:'Egypt',emoji:'⚓',color:'#ffc277',list:'Wrecks',lat:27.8,lng:33.9},
  ];
  const lists = [
    {name:'Favorites',icon:'⭐',count:2,color:'#ffc277'},
    {name:'Bucket List',icon:'🌊',count:2,color:'#00e5d4'},
    {name:'Wrecks',icon:'⚓',count:1,color:'#a78bfa'},
  ];

  const requestLoc = () => {
    if(!navigator.geolocation){setGeoState('denied');return;}
    setGeoState('loading');
    navigator.geolocation.getCurrentPosition(
      p=>{setUserLoc({lat:p.coords.latitude,lng:p.coords.longitude});setGeoState('ready');},
      ()=>setGeoState('denied'),
      {timeout:8000}
    );
  };

  const haversine = (a,b) => {
    const R=6371,toRad=d=>d*Math.PI/180;
    const dLat=toRad(b.lat-a.lat),dLng=toRad(b.lng-a.lng);
    const x=Math.sin(dLat/2)**2+Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;
    return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  };

  useEffect(()=>{ if(filter==='Nearby'&&geoState==='idle') requestLoc(); },[filter]);

  const nearbySpots = userLoc ? [...allSpots]
    .map(s=>({...s,km:Math.round(haversine(userLoc,{lat:s.lat,lng:s.lng}))}))
    .sort((a,b)=>a.km-b.km) : [];

  return (
    <div style={{padding:'20px',overflowY:'auto',height:'100%',boxSizing:'border-box'}}>
      <div style={{display:'flex',gap:8,marginBottom:20,alignItems:'center'}}>
        <button style={{background:C.glass,border:`1px solid ${C.glassBd}`,borderRadius:99,
          width:36,height:36,color:'white',fontSize:16,cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center'}}>🔍</button>
        {['All','Lists','Nearby'].map(t=>(
          <button key={t} onClick={()=>setFilter(t)} style={{
            padding:'8px 18px',borderRadius:99,fontSize:13,fontWeight:700,cursor:'pointer',
            background:filter===t?'white':C.glass,color:filter===t?C.deep:'white',
            border:`1px solid ${filter===t?'white':C.glassBd}`,
            display:'flex',alignItems:'center',gap:6,transition:'all 0.2s'}}>
            {t==='Lists'&&'🔖'}{t==='Nearby'&&'📍'}{t}
          </button>
        ))}
      </div>
      {filter==='Lists' ? (
        <>
          <div style={{color:C.biolume,fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>Your Lists</div>
          {lists.map(l=>(
            <div key={l.name} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,
              background:C.glass,border:`1px solid ${C.glassBd}`,marginBottom:10,cursor:'pointer'}}>
              <div style={{width:46,height:46,borderRadius:12,background:`${l.color}22`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{l.icon}</div>
              <div>
                <div style={{color:'white',fontWeight:800,fontSize:15}}>{l.name}</div>
                <div style={{color:C.textSec,fontSize:12,marginTop:2}}>{l.count} spots</div>
              </div>
              <div style={{marginLeft:'auto',color:C.biolume,fontSize:18}}>›</div>
            </div>
          ))}
        </>
      ) : filter==='Nearby' ? (
        geoState==='loading' ? (
          <div style={{textAlign:'center',padding:'40px 20px',color:C.textSec}}>
            <div style={{fontSize:40,marginBottom:12}}>📡</div>
            <div style={{fontWeight:700,color:'white'}}>Finding your location…</div>
          </div>
        ) : geoState==='denied' ? (
          <div style={{textAlign:'center',padding:'40px 20px'}}>
            <div style={{fontSize:40,marginBottom:12}}>📍</div>
            <div style={{color:'white',fontWeight:800,fontSize:16}}>Share your location</div>
            <div style={{color:C.textSec,fontSize:13,marginTop:8,marginBottom:20}}>Enable location to see spots sorted by distance from you.</div>
            <button onClick={requestLoc} style={{padding:'12px 24px',borderRadius:99,background:C.biolume,
              color:C.deep,fontWeight:800,border:'none',cursor:'pointer'}}>Enable Location</button>
          </div>
        ) : (
          <>
            <div style={{color:C.biolume,fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>📍 Sorted by distance from you</div>
            {nearbySpots.map(s=>(
              <div key={s.name} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,
                background:C.glass,border:`1px solid ${C.glassBd}`,marginBottom:10}}>
                <div style={{width:46,height:46,borderRadius:12,background:`${s.color}22`,
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{s.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{color:'white',fontWeight:800,fontSize:15}}>{s.name}</div>
                  <div style={{color:C.textSec,fontSize:12,marginTop:2}}>📍 {s.loc}</div>
                </div>
                <div style={{color:C.biolume,fontSize:12,fontWeight:700}}>{s.km.toLocaleString()} km</div>
              </div>
            ))}
          </>
        )
      ) : (
        <>
          {allSpots.map(s=>(
            <div key={s.name} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,
              background:C.glass,border:`1px solid ${C.glassBd}`,marginBottom:10}}>
              <div style={{width:46,height:46,borderRadius:12,background:`${s.color}22`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{s.emoji}</div>
              <div>
                <div style={{color:'white',fontWeight:800,fontSize:15}}>{s.name}</div>
                <div style={{color:C.textSec,fontSize:12,marginTop:2}}>📍 {s.loc} · {s.list}</div>
              </div>
              <div style={{marginLeft:'auto',color:C.biolume,fontSize:18}}>›</div>
            </div>
          ))}
        </>
      )}
      <button onClick={onAddSpots} style={{
        display:'flex',alignItems:'center',justifyContent:'center',gap:8,
        width:'100%',padding:'14px',borderRadius:14,fontSize:15,fontWeight:800,marginTop:8,
        background:`linear-gradient(135deg,rgba(0,229,212,0.15),rgba(0,160,233,0.1))`,
        border:`1.5px solid ${C.biolume}`,color:C.biolume,cursor:'pointer',
        boxShadow:'0 0 20px rgba(0,229,212,0.15)'}}>
        + Add Dive Spots
      </button>
    </div>
  );
}

/* ─── MAIN APP ─── */
function MainApp({ onSignOut }) {
  const [tab, setTab] = useState('trips');
  const [panel, setPanel] = useState(null);
  const [actionOpen, setActionOpen] = useState(false);
  const [profileOpen, setProfileOpen] = useState(false);
  const [selectedTrip, setSelectedTrip] = useState(null);
  const [trips, setTrips] = useState(TRIPS);

  const profileWrapRef = useRef(null);
  const sharedMapRef = useRef(null);
  const tripMarkersRef = useRef([]);

  useEffect(() => {
    if (!profileOpen) return;
    const close = (e) => {
      if (profileWrapRef.current && !profileWrapRef.current.contains(e.target)) setProfileOpen(false);
    };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [profileOpen]);

  const clearTripMarkers = () => {
    tripMarkersRef.current.forEach(m => m.setMap(null));
    tripMarkersRef.current = [];
  };

  const handleTripClick = (t) => {
    setSelectedTrip(t);
    setPanel('detail');
    const map = sharedMapRef.current;
    if (!map || !t.center) return;
    clearTripMarkers();
    map.panTo({ lat: t.center[0], lng: t.center[1] });
    map.setZoom(t.zoom || 13);
    setTimeout(() => {
      if (!sharedMapRef.current) return;
      t.pins.forEach(([lat, lng, name], i) => {
        const marker = new google.maps.Marker({
          position: { lat, lng },
          map: sharedMapRef.current,
          label: {
            text: String(i + 1),
            color: '#06101e',
            fontWeight: '900',
            fontSize: '13px',
            fontFamily: 'Nunito, sans-serif',
          },
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 15,
            fillColor: t.color,
            fillOpacity: 1,
            strokeColor: 'white',
            strokeWeight: 3,
          },
          title: name,
        });
        marker.addListener('click', () => { setSelectedTrip(t); setPanel('detail'); });
        tripMarkersRef.current.push(marker);
      });
    }, 500);
  };

  const handleWorldMarkerClick = (tripId) => {
    const t = trips.find(x => x.id === tripId);
    if (t) { setTab('trips'); handleTripClick(t); }
  };

  const handleAction = (id) => {
    if (id === 'trip') setPanel('plan');
    if (id === 'list') setPanel('newlist');
    if (id === 'spots') setPanel('addspots');
  };

  const handlePlanDone = () => {
    setTrips(t => [...t, {id:Date.now(),title:'New Trip',loc:'Palawan, Philippines',days:4,spots:10,color:'#6fd8be'}]);
    setPanel(null);
  };

  const handleBack = () => {
    setPanel(null);
    clearTripMarkers();
    if (sharedMapRef.current) {
      sharedMapRef.current.panTo({ lat: 20, lng: 10 });
      sharedMapRef.current.setZoom(2);
    }
  };

  const handleDeleteAccount = () => {
    if (!window.confirm('Delete your DeepDive account and local data? This cannot be undone.')) return false;
    try {
      localStorage.removeItem('dd_screen');
      localStorage.removeItem('dd_onboard');
    } catch (_) {}
    if (typeof onSignOut === 'function') onSignOut({ deleteAccount: true });
    return true;
  };

  return (
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      {/* TOP NAV */}
      <div style={{position:'relative',zIndex:10,display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'14px 20px',background:'rgba(4,8,20,0.6)',backdropFilter:'blur(16px)',
        borderBottom:`1px solid ${C.glassBd}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <OllieOctopus size={36} hat={true}/>
          <div>
            <div style={{color:C.biolume,fontWeight:900,fontSize:18,letterSpacing:'-0.5px'}}>DeepDive</div>
            <div style={{color:C.textMut,fontSize:11}}>Explore the depths</div>
          </div>
        </div>
        <div style={{flex:1,maxWidth:320,margin:'0 20px',position:'relative'}}>
          <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:16}}>🔍</div>
          <input placeholder="Search ocean destinations..." style={{
            width:'100%',padding:'10px 10px 10px 38px',borderRadius:12,
            background:'rgba(255,255,255,0.07)',border:`1px solid ${C.glassBd}`,
            color:'white',fontSize:14,outline:'none',boxSizing:'border-box'}}/>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <div style={{position:'relative',cursor:'pointer'}}>
            <OllieOctopus size={36} hat={false}/>
            <div style={{position:'absolute',top:-2,right:-2,width:14,height:14,borderRadius:'50%',
              background:'#ff6e7a',display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:9,fontWeight:900,color:'white',boxShadow:'0 0 8px rgba(255,110,122,0.6)'}}>5</div>
          </div>
          <div ref={profileWrapRef} style={{position:'relative'}}>
            <button
              type="button"
              aria-expanded={profileOpen}
              aria-haspopup="menu"
              onClick={() => setProfileOpen(v => !v)}
              style={{
                width:36,height:36,borderRadius:'50%',background:C.glassBr,border:`1px solid ${C.glassBd}`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,cursor:'pointer',
                padding:0,
              }}
            >👤</button>
            {profileOpen && (
              <ProfileMenu
                onClose={() => setProfileOpen(false)}
                onSignOut={() => { if (typeof onSignOut === 'function') onSignOut({ deleteAccount: false }); }}
                onDeleteAccount={handleDeleteAccount}
              />
            )}
          </div>
        </div>
      </div>

      {/* CONTENT AREA */}
      <div style={{position:'relative',zIndex:5,flex:1,display:'flex',overflow:'hidden'}}>
        {/* MAP */}
        <div style={{flex:1,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',inset:0,overflow:'hidden'}}>
            <OceanMap mapRef={sharedMapRef} onMarkerClick={handleWorldMarkerClick}/>
          </div>
          <div style={{position:'absolute',bottom:30,left:'50%',transform:'translateX(-50%)',
            background:'rgba(4,8,20,0.8)',border:`1px solid ${C.glassBd}`,borderRadius:99,
            padding:'8px 16px',backdropFilter:'blur(10px)',color:C.textSec,fontSize:13,fontWeight:600,
            display:'flex',alignItems:'center',gap:8,zIndex:10,pointerEvents:'none'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:C.biolume,
              boxShadow:`0 0 8px ${C.biolume}`,animation:'pulse 2s infinite'}}/>
            Drag to explore the ocean
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div style={{width:360,background:'rgba(6,14,28,0.88)',backdropFilter:'blur(20px)',
          borderLeft:`1px solid ${C.glassBd}`,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {panel===null && <>
            <div style={{display:'flex',borderBottom:`1px solid ${C.glassBd}`}}>
              {['trips','spots'].map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={{
                  flex:1,padding:'16px',fontWeight:800,fontSize:14,cursor:'pointer',
                  background:'none',border:'none',color:tab===t?'white':C.textSec,
                  borderBottom:`2px solid ${tab===t?C.biolume:'transparent'}`,
                  textTransform:'capitalize',transition:'all 0.2s',
                }}>{t==='trips'?'🌊 Expeditions':'🐠 Spots'}</button>
              ))}
            </div>
            <div style={{flex:1,overflow:'hidden'}}>
              {tab==='trips' && <TripsTab trips={trips} onPlan={()=>setPanel('plan')} onTripClick={handleTripClick}/>}
              {tab==='spots' && <SpotsTab onAddSpots={()=>setPanel('addspots')}/>}
            </div>
          </>}
          {panel==='plan' && <PlanTripPanel onClose={()=>setPanel(null)} onDone={handlePlanDone}/>}
          {panel==='detail' && selectedTrip && <TripDetail trip={selectedTrip} onBack={handleBack}/>}
          {panel==='addspots' && <AddSpotsSheet onClose={()=>setPanel(null)}/>}
          {panel==='newlist' && <NewListModal onClose={()=>setPanel(null)} onCreate={()=>setPanel(null)}/>}
        </div>
      </div>

      {/* FAB */}
      <button onClick={()=>setActionOpen(v=>!v)} style={{
        position:'absolute',bottom:24,right:24,zIndex:20,
        width:56,height:56,borderRadius:'50%',
        background:actionOpen?'#ff6e7a':`linear-gradient(135deg,${C.biolume},#00a0e9)`,
        border:'none',fontSize:28,cursor:'pointer',transition:'all 0.3s',
        boxShadow:`0 0 30px ${actionOpen?'rgba(255,110,122,0.4)':'rgba(0,229,212,0.5)'}`,
        display:'flex',alignItems:'center',justifyContent:'center',
        transform:actionOpen?'rotate(45deg)':'rotate(0deg)',
      }}>+</button>

      {actionOpen && <ActionSheet onClose={()=>setActionOpen(false)} onAction={handleAction}/>}

      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
    </div>
  );
}

          padding:'14px',borderRadius:18,fontSize:15,fontWeight:700,cursor:'pointer',
          background:'rgba(255,255,255,0.06)',color:C.textSec,
          border:`1px solid ${C.glassBd}`}}>
          Sign In
        </button>
      </div>
      <div style={{marginTop:32,display:'flex',gap:24,alignItems:'center'}}>
        <div style={{textAlign:'center'}}><FinnShark size={56}/><div style={{color:C.textMut,fontSize:11,marginTop:4}}>Finn</div></div>
        <div style={{textAlign:'center'}}><CoralFish size={56}/><div style={{color:C.textMut,fontSize:11,marginTop:4}}>Coral</div></div>
        <div style={{textAlign:'center'}}><PearlPuffer size={56}/><div style={{color:C.textMut,fontSize:11,marginTop:4}}>Pearl</div></div>
        <div style={{textAlign:'center'}}><SeahorseGuide size={42}/><div style={{color:C.textMut,fontSize:11,marginTop:4}}>Shelby</div></div>

function AuthBackdrop() {
  return (
    <>
      {Array.from({length:18}).map((_,i)=>(
        <div key={i} style={{position:'absolute',
          left:`${(i*53)%100}%`,top:`${(i*37)%100}%`,
          width:3+((i*7)%4),height:3+((i*7)%4),borderRadius:'50%',
          background:`rgba(0,229,212,${0.15+((i%5)*0.08)})`,
          boxShadow:'0 0 8px rgba(0,229,212,0.5)',
          animation:`float${i%4} ${3.2+(i%5)*0.6}s ease-in-out infinite`,
          animationDelay:`${(i%7)*0.3}s`}}/>
      ))}
    </>
  );
}

const inputAuth = {
  width:'100%',padding:'14px 16px',borderRadius:14,fontSize:15,fontWeight:600,
  background:'rgba(255,255,255,0.06)',border:`1px solid ${C.glassBd}`,color:'white',
  outline:'none',boxSizing:'border-box',
};
const labelAuth = { color:C.textSec,fontSize:12,fontWeight:700,marginBottom:8,display:'block' };

/* ─── SIGN UP ─── */
function SignUpScreen({ onBack, onSuccess, onSignIn }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [confirm, setConfirm] = useState('');
  const [terms, setTerms] = useState(false);
  const [error, setError] = useState('');

  const submit = (e) => {
    e.preventDefault();
    setError('');
    const em = email.trim().toLowerCase();
    if (!em) { setError('Email is required.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) { setError('Enter a valid email address.'); return; }
    if (password.length < 8) { setError('Password must be at least 8 characters.'); return; }
    if (password !== confirm) { setError('Passwords do not match.'); return; }
    if (!terms) { setError('Please accept the terms to continue.'); return; }
    const accounts = loadAccounts();
    if (accounts[em]) { setError('An account with this email already exists. Sign in instead.'); return; }
    accounts[em] = { name: name.trim(), password };
    saveAccounts(accounts);
    const display = name.trim() || em.split('@')[0];
    localStorage.setItem('dd_session', JSON.stringify({ email: em, name: display }));
    onSuccess();
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',
      background:'radial-gradient(ellipse at 50% 20%, #0d2a50 0%, #060e1c 55%, #04080f 100%)',
      position:'relative',overflow:'hidden',overflowY:'auto'}}>
      <AuthBackdrop/>
      <div style={{position:'relative',zIndex:1,padding:'20px 24px 32px',maxWidth:400,margin:'0 auto',width:'100%'}}>
        <button type="button" onClick={onBack} style={{
          color:C.textSec,fontSize:14,fontWeight:700,marginBottom:20,cursor:'pointer',
          background:'none',border:'none',padding:0,
        }}>← Back</button>
        <MascotBubble mascot="ollie" message="Join the crew — your reefs are waiting! 🐙" style={{marginBottom:20}}/>
        <h1 style={{color:'white',fontSize:28,fontWeight:900,marginBottom:6,letterSpacing:'-0.5px'}}>Create account</h1>
        <p style={{color:C.textSec,fontSize:14,marginBottom:24,lineHeight:1.5}}>Save trips and sync your dives when you connect a backend.</p>
        <form onSubmit={submit}>
          <div style={{marginBottom:16}}>
            <label style={labelAuth}>Display name <span style={{fontWeight:600,opacity:0.7}}>(optional)</span></label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Captain Nemo"
              autoComplete="name" style={inputAuth}/>
          </div>
          <div style={{marginBottom:16}}>
            <label style={labelAuth}>Email</label>
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"
              type="email" autoComplete="email" style={inputAuth}/>
          </div>
          <div style={{marginBottom:16}}>
            <label style={labelAuth}>Password</label>
            <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="At least 8 characters"
              type="password" autoComplete="new-password" style={inputAuth}/>
          </div>
          <div style={{marginBottom:16}}>
            <label style={labelAuth}>Confirm password</label>
            <input value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Repeat password"
              type="password" autoComplete="new-password" style={inputAuth}/>
          </div>
          <label style={{display:'flex',alignItems:'flex-start',gap:12,cursor:'pointer',marginBottom:20}}>
            <input type="checkbox" checked={terms} onChange={e=>setTerms(e.target.checked)}
              style={{width:20,height:20,marginTop:2,accentColor:C.biolume,flexShrink:0}}/>
            <span style={{color:C.textSec,fontSize:13,lineHeight:1.45}}>
              I agree to the <span style={{color:C.biolume,fontWeight:700}}>Terms</span> and{' '}
              <span style={{color:C.biolume,fontWeight:700}}>Privacy Policy</span> (demo copy).
            </span>
          </label>
          {error && (
            <div role="alert" style={{
              marginBottom:16,padding:'12px 14px',borderRadius:12,
              background:'rgba(255,110,122,0.12)',border:`1px solid rgba(255,110,122,0.35)`,
              color:'#ffb3bc',fontSize:13,fontWeight:600,
            }}>{error}</div>
          )}
          <button type="submit" style={{
            width:'100%',padding:'16px',borderRadius:16,fontSize:16,fontWeight:800,cursor:'pointer',
            background:`linear-gradient(135deg,${C.biolume},#00a0e9)`,color:C.deep,
            border:'none',boxShadow:'0 0 30px rgba(0,229,212,0.35)',
          }}>Create account</button>
        </form>
        <p style={{textAlign:'center',marginTop:20,color:C.textSec,fontSize:14}}>
          Already have an account?{' '}
          <button type="button" onClick={onSignIn} style={{
            background:'none',border:'none',color:C.biolume,fontWeight:800,cursor:'pointer',padding:0,
          }}>Sign in</button>
        </p>
      </div>
      <style>{`
        @keyframes float0{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
        @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
      `}</style>
    </div>
  );
}

/* ─── SIGN IN ─── */
function SignInScreen({ onBack, onSuccess, onGoSignUp }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  const submit = (e) => {
    e.preventDefault();
    setError('');
    const em = email.trim().toLowerCase();
    if (!em || !password) { setError('Enter email and password.'); return; }
    const accounts = loadAccounts();
    const acc = accounts[em];
    if (!acc || acc.password !== password) { setError('Invalid email or password.'); return; }
    const display = acc.name || em.split('@')[0];
    localStorage.setItem('dd_session', JSON.stringify({ email: em, name: display }));
    onSuccess();
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',
      background:'radial-gradient(ellipse at 50% 20%, #0d2a50 0%, #060e1c 55%, #04080f 100%)',
      position:'relative',overflow:'hidden',overflowY:'auto'}}>
      <AuthBackdrop/>
      <div style={{position:'relative',zIndex:1,padding:'20px 24px 32px',maxWidth:400,margin:'0 auto',width:'100%'}}>
        <button type="button" onClick={onBack} style={{
          color:C.textSec,fontSize:14,fontWeight:700,marginBottom:20,cursor:'pointer',
          background:'none',border:'none',padding:0,
        }}>← Back</button>
        <div style={{marginBottom:20}}><FinnShark size={72}/></div>
        <h1 style={{color:'white',fontSize:28,fontWeight:900,marginBottom:6,letterSpacing:'-0.5px'}}>Welcome back</h1>
        <p style={{color:C.textSec,fontSize:14,marginBottom:24}}>Sign in to pick up where you left off.</p>
        <form onSubmit={submit}>
          <div style={{marginBottom:16}}>
            <label style={labelAuth}>Email</label>
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"
              type="email" autoComplete="email" style={inputAuth}/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={labelAuth}>Password</label>
            <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="Your password"
              type="password" autoComplete="current-password" style={inputAuth}/>
          </div>
          {error && (
            <div role="alert" style={{
              marginBottom:16,padding:'12px 14px',borderRadius:12,
              background:'rgba(255,110,122,0.12)',border:`1px solid rgba(255,110,122,0.35)`,
              color:'#ffb3bc',fontSize:13,fontWeight:600,
            }}>{error}</div>
          )}
          <button type="submit" style={{
            width:'100%',padding:'16px',borderRadius:16,fontSize:16,fontWeight:800,cursor:'pointer',
            background:`linear-gradient(135deg,${C.biolume},#00a0e9)`,color:C.deep,
            border:'none',boxShadow:'0 0 30px rgba(0,229,212,0.35)',
          }}>Sign In</button>
        </form>
        <p style={{textAlign:'center',marginTop:20,color:C.textSec,fontSize:14}}>
          New here?{' '}
          <button type="button" onClick={onGoSignUp} style={{
            background:'none',border:'none',color:C.biolume,fontWeight:800,cursor:'pointer',padding:0,
          }}>Create an account</button>
        </p>
      </div>
      <style>{`
        @keyframes float0{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
        @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
      `}</style>
    </div>
  );
}

/* ─── TWEAKS PANEL ─── */
const TWEAK_DEFAULTS = { accentColor:'#6fd8be', showMascots:true, panelWidth:360 };

function TweaksPanel({tweaks, onChange, onClose}) {
  return (
    <div style={{position:'fixed',bottom:80,right:24,zIndex:1000,background:'rgba(6,14,28,0.97)',
      border:`1px solid ${C.glassBd}`,borderRadius:20,padding:'20px',width:260,
      backdropFilter:'blur(20px)',boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <span style={{color:C.biolume,fontWeight:800,fontSize:14}}>Tweaks</span>
        <button onClick={onClose} style={{color:C.textSec,fontSize:16,cursor:'pointer'}}>✕</button>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{color:C.textSec,fontSize:12,fontWeight:700,display:'block',marginBottom:6}}>Accent Color</label>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {['#00e5d4','#ff6e7a','#ffb84d','#6fd8be','#a78bfa'].map(c=>(
            <button key={c} onClick={()=>onChange({...tweaks,accentColor:c})} style={{
              width:28,height:28,borderRadius:'50%',background:c,
              border:`3px solid ${tweaks.accentColor===c?'white':'transparent'}`,cursor:'pointer'}}/>
          ))}
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{color:C.textSec,fontSize:12,fontWeight:700}}>Show Mascots</span>
        <button onClick={()=>onChange({...tweaks,showMascots:!tweaks.showMascots})} style={{
          width:44,height:24,borderRadius:99,border:'none',cursor:'pointer',transition:'all 0.3s',
          background:tweaks.showMascots?C.biolume:'rgba(255,255,255,0.15)',position:'relative'}}>
          <div style={{position:'absolute',top:3,left:tweaks.showMascots?22:3,width:18,height:18,
            borderRadius:'50%',background:'white',transition:'all 0.3s'}}/>
        </button>
      </div>
    </div>
  );
}

/* ─── ROOT APP ─── */
function App() {
  const savedScreen = localStorage.getItem('dd_screen') || 'splash';
  const savedOnboard = parseInt(localStorage.getItem('dd_onboard') || '0');
  const [screen, setScreen] = useState(savedScreen);
  const [onboardStep, setOnboardStep] = useState(savedOnboard);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => { localStorage.setItem('dd_screen', screen); }, [screen]);
  useEffect(() => { localStorage.setItem('dd_onboard', String(onboardStep)); }, [onboardStep]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleTweakChange = (t) => {
    setTweaks(t);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:t}, '*');
  };

  const goOnboard = (step) => { setOnboardStep(step); setScreen('onboard'); };

  return (
    <div style={{width:'100vw',height:'100vh',overflow:'hidden',position:'relative'}}>
      {screen==='splash' && (
        <SplashScreen
          onStart={()=>goOnboard(1)}
          onSignUp={()=>setScreen('signup')}
          onSignIn={()=>setScreen('signin')}
        />
      )}
      {screen==='signup' && (
        <SignUpScreen
          onBack={()=>setScreen('splash')}
          onSignIn={()=>setScreen('signin')}
          onSuccess={()=>goOnboard(1)}
        />
      )}
      {screen==='signin' && (
        <SignInScreen
          onBack={()=>setScreen('splash')}
          onGoSignUp={()=>setScreen('signup')}
          onSuccess={()=>setScreen('app')}
        />
      )}
      {screen==='onboard' && onboardStep===1 && <OnboardAgeScreen onNext={()=>setOnboardStep(2)} onBack={()=>setScreen('splash')}/>}
      {screen==='onboard' && onboardStep===2 && <OnboardTripScreen onNext={()=>setOnboardStep(3)} onBack={()=>setOnboardStep(1)}/>}
      {screen==='onboard' && onboardStep===3 && <OnboardStyleScreen onNext={()=>setScreen('app')} onBack={()=>setOnboardStep(2)}/>}
      {screen==='app' && (
        <MainApp onSignOut={(opts) => {
          try {
            if (opts?.deleteAccount) {
              try {
                const s = JSON.parse(localStorage.getItem('dd_session') || 'null');
                if (s?.email) {
                  const accounts = loadAccounts();
                  delete accounts[s.email];
                  saveAccounts(accounts);
                }
              } catch (_) {}
              localStorage.removeItem('dd_session');
              localStorage.removeItem('dd_screen');
              localStorage.removeItem('dd_onboard');
            } else {
              clearSession();
              localStorage.setItem('dd_screen', 'splash');
            }
          } catch (_) {}
          setScreen('splash');
        }}/>
      )}
      {tweaksVisible && <TweaksPanel tweaks={tweaks} onChange={handleTweakChange} onClose={()=>setTweaksVisible(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
