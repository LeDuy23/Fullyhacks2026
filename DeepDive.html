  const [geoState, setGeoState] = useState('idle');
  const [nearbyDiscover, setNearbyDiscover] = useState({ food: [], fun: [] });
  const [nearbyDiscoverLoading, setNearbyDiscoverLoading] = useState(false);
  const [nearbyDiscoverErr, setNearbyDiscoverErr] = useState(null);

  const listLabel = (listId) => {
    if (listId == null || listId === '') return 'On map';
    const L = userLists.find((x) => x.id === listId);
    return L ? L.name : 'List';
  };
  const allSpots = (savedSpots || []).map((s) => ({ ...s, list: listLabel(s.listId) }));
  const lists = (userLists || []).map((l) => ({
    ...l,
    count: (savedSpots || []).filter((s) => s.listId === l.id).length,
  }));

  const requestLoc = () => {
    if(!navigator.geolocation){setGeoState('denied');return;}
    setGeoState('loading');
    navigator.geolocation.getCurrentPosition(
      p=>{setUserLoc({lat:p.coords.latitude,lng:p.coords.longitude});setGeoState('ready');},
      ()=>setGeoState('denied'),
      {timeout:8000}
    );
  };

  const haversine = (a,b) => {
    const R=6371,toRad=d=>d*Math.PI/180;
    const dLat=toRad(b.lat-a.lat),dLng=toRad(b.lng-a.lng);
    const x=Math.sin(dLat/2)**2+Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;
    return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  };

  useEffect(()=>{ if(filter==='Nearby'&&geoState==='idle') requestLoc(); },[filter]);

  useEffect(() => {
    if (filter !== 'Nearby' || geoState !== 'ready' || !userLoc) return;
    let cancelled = false;
    let attempts = 0;
    const maxAttempts = 40;
    setNearbyDiscoverLoading(true);
    setNearbyDiscoverErr(null);
    const run = () => {
      if (cancelled) return;
      if (!window.google || !google.maps || !google.maps.places) {
        attempts += 1;
        if (attempts >= maxAttempts) {
          setNearbyDiscoverErr('Places library not loaded');
          setNearbyDiscover({ food: [], fun: [] });
          setNearbyDiscoverLoading(false);
          return;
        }
        setTimeout(run, 150);
        return;
      }
      const profile = loadUserProfile();
      fetchNearbyFoodAndFun(userLoc.lat, userLoc.lng, profile)
        .then((data) => {
          if (!cancelled) {
            setNearbyDiscover(data);
            setNearbyDiscoverLoading(false);
          }
        })
        .catch((e) => {
          if (!cancelled) {
            setNearbyDiscoverErr(e && e.message ? e.message : 'Could not load nearby places');
            setNearbyDiscover({ food: [], fun: [] });
            setNearbyDiscoverLoading(false);
          }
        });
    };
    run();
    return () => { cancelled = true; };
  }, [filter, geoState, userLoc]);

  useEffect(() => {
    onNearbyMapSync({
      active: filter === 'Nearby',
      geoState,
      userLoc,
      nearbyDiscover,
    });
  }, [filter, geoState, userLoc, nearbyDiscover, onNearbyMapSync]);

  const focusedList = listFocusId ? (userLists || []).find((l) => l.id === listFocusId) : null;

  const withCoords = allSpots.filter((s) => s.lat != null && s.lng != null && !Number.isNaN(s.lat) && !Number.isNaN(s.lng));
  const nearbySpots = userLoc
    ? [...withCoords]
        .map((s) => ({ ...s, km: Math.round(haversine(userLoc, { lat: s.lat, lng: s.lng })) }))
        .sort((a, b) => a.km - b.km)
    : [];

  if (focusedList) {
    return (
      <ListDetailView
        list={focusedList}
        savedSpots={savedSpots}
        onBack={() => onListFocusIdChange(null)}
        onAddSpots={onAddSpots}
      />
    );
  }

  return (
    <div style={{padding:'20px',overflowY:'auto',height:'100%',boxSizing:'border-box'}}>
      <div style={{display:'flex',gap:8,marginBottom:20,alignItems:'center'}}>
        <button style={{background:C.glass,border:`1px solid ${C.glassBd}`,borderRadius:99,
          width:36,height:36,color:'white',fontSize:16,cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center'}}>🔍</button>
        {['All','Lists','Nearby'].map(t=>(
          <button key={t} onClick={()=>setFilter(t)} style={{
            padding:'8px 18px',borderRadius:99,fontSize:13,fontWeight:700,cursor:'pointer',
            background:filter===t?'white':C.glass,color:filter===t?C.deep:'white',
            border:`1px solid ${filter===t?'white':C.glassBd}`,
            display:'flex',alignItems:'center',gap:6,transition:'all 0.2s'}}>
            {t==='Lists'&&'🔖'}{t==='Nearby'&&'📍'}{t}
          </button>
        ))}
      </div>
      {filter==='Lists' ? (
        <>
          <div style={{color:C.biolume,fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>Your Lists</div>
          {lists.map((l, li) => (
            <div
              key={l.id || l.name}
              role="button"
              tabIndex={0}
              data-testid={li === 0 ? 'spots-list-row' : undefined}
              onClick={() => onListFocusIdChange(l.id)}
              onKeyDown={(e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                  e.preventDefault();
                  onListFocusIdChange(l.id);
                }
              }}
              style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,
                background:C.glass,border:`1px solid ${C.glassBd}`,marginBottom:10,cursor:'pointer'}}
            >
              <div style={{width:46,height:46,borderRadius:12,background:`${l.color}22`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{l.icon}</div>
              <div>
                <div style={{color:'white',fontWeight:800,fontSize:15}}>{l.name}</div>
                <div style={{color:C.textSec,fontSize:12,marginTop:2}}>{l.count} spots</div>
              </div>
              <div style={{marginLeft:'auto',color:C.biolume,fontSize:18}}>›</div>
            </div>
          ))}
        </>
      ) : filter==='Nearby' ? (
        geoState==='loading' ? (
          <div style={{textAlign:'center',padding:'40px 20px',color:C.textSec}}>
            <div style={{fontSize:40,marginBottom:12}}>📡</div>
            <div style={{fontWeight:700,color:'white'}}>Finding your location…</div>
          </div>
        ) : geoState==='denied' ? (
          <div style={{textAlign:'center',padding:'40px 20px'}}>
            <div style={{fontSize:40,marginBottom:12}}>📍</div>
            <div style={{color:'white',fontWeight:800,fontSize:16}}>Share your location</div>
            <div style={{color:C.textSec,fontSize:13,marginTop:8,marginBottom:20}}>Enable location to see spots sorted by distance from you.</div>
            <button onClick={requestLoc} style={{padding:'12px 24px',borderRadius:99,background:C.biolume,
              color:C.deep,fontWeight:800,border:'none',cursor:'pointer'}}>Enable Location</button>
          </div>
        ) : (
          <>
            <p style={{color:C.textSec,fontSize:13,lineHeight:1.5,margin:'0 0 16px'}}>
              {personalityNearbyHint(loadUserProfile().styles)}
            </p>
            {nearbyDiscoverLoading && (
              <div style={{textAlign:'center',padding:'12px 0 20px',color:C.textSec,fontSize:13}}>
                Finding food & entertainment near you…
              </div>
            )}
            {nearbyDiscoverErr && !nearbyDiscoverLoading && (
              <div style={{padding:'12px 14px',borderRadius:12,background:'rgba(255,110,122,0.08)',border:`1px solid rgba(255,110,122,0.35)`,
                color:C.textSec,fontSize:12,marginBottom:16,lineHeight:1.45}}>
                {nearbyDiscoverErr.includes('Places') ? 'Turn on Places in Google Cloud for this API key, or check the Maps script loaded with the places library.' : nearbyDiscoverErr}
              </div>
            )}
            {!nearbyDiscoverLoading && (nearbyDiscover.food.length > 0 || nearbyDiscover.fun.length > 0) && (
              <>
                {nearbyDiscover.food.length > 0 && (
                  <>
                    <div style={{color:C.biolume,fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>🍽 Food & drink near you</div>
                    {nearbyDiscover.food.map((p) => (
                      <div key={p.id} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,
                        background:C.glass,border:`1px solid ${C.glassBd}`,marginBottom:10}}>
                        <div style={{width:46,height:46,borderRadius:12,background:'rgba(0,229,212,0.12)',
                          display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🍽</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{color:'white',fontWeight:800,fontSize:15}}>{p.name}</div>
                          <div style={{color:C.textSec,fontSize:12,marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                            {p.vicinity || 'Nearby'}{p.rating != null ? ` · ★ ${p.rating}` : ''}
                          </div>
                        </div>
                        <div style={{color:C.biolume,fontSize:12,fontWeight:700,flexShrink:0}}>{p.km} km</div>
                      </div>
                    ))}
                  </>
                )}
                {nearbyDiscover.fun.length > 0 && (
                  <>
                    <div style={{color:C.biolume,fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1,margin:'18px 0 10px'}}>🎭 Entertainment near you</div>
                    {nearbyDiscover.fun.map((p) => (
                      <div key={p.id} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,
                        background:C.glass,border:`1px solid ${C.glassBd}`,marginBottom:10}}>
                        <div style={{width:46,height:46,borderRadius:12,background:'rgba(0,160,233,0.12)',
                          display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🎭</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{color:'white',fontWeight:800,fontSize:15}}>{p.name}</div>
                          <div style={{color:C.textSec,fontSize:12,marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                            {p.vicinity || 'Nearby'}{p.rating != null ? ` · ★ ${p.rating}` : ''}
                          </div>
                        </div>
                        <div style={{color:C.biolume,fontSize:12,fontWeight:700,flexShrink:0}}>{p.km} km</div>
                      </div>
                    ))}
                  </>
                )}
              </>
            )}
            <div style={{color:C.biolume,fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1,margin:'8px 0 10px'}}>📍 Your saved spots (by distance)</div>
            {nearbySpots.length === 0 ? (
              <div style={{color:C.textSec,fontSize:13,padding:'8px 0 12px'}}>No saved spots with coordinates yet — add dives with a location to see them here.</div>
            ) : (
              nearbySpots.map((s) => (
                <div key={s.id || s.name} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,
                  background:C.glass,border:`1px solid ${C.glassBd}`,marginBottom:10}}>
                  <div style={{width:46,height:46,borderRadius:12,background:`${s.color}22`,
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{s.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{color:'white',fontWeight:800,fontSize:15}}>{s.name}</div>
                    <div style={{color:C.textSec,fontSize:12,marginTop:2}}>📍 {s.loc}</div>
                  </div>
                  <div style={{color:C.biolume,fontSize:12,fontWeight:700}}>{s.km.toLocaleString()} km</div>
                </div>
              ))
            )}
          </>
        )
      ) : (
        <>
          {allSpots.map((s) => (
            <div key={s.id || s.name} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',borderRadius:16,
              background:C.glass,border:`1px solid ${C.glassBd}`,marginBottom:10}}>
              <div style={{width:46,height:46,borderRadius:12,background:`${s.color}22`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{s.emoji}</div>
              <div>
                <div style={{color:'white',fontWeight:800,fontSize:15}}>{s.name}</div>
                <div style={{color:C.textSec,fontSize:12,marginTop:2}}>📍 {s.loc} · {s.list}</div>
              </div>
              <div style={{marginLeft:'auto',color:C.biolume,fontSize:18}}>›</div>
            </div>
          ))}
        </>
      )}
      <button type="button" data-testid="spots-add-dive" onClick={onAddSpots} style={{
        display:'flex',alignItems:'center',justifyContent:'center',gap:8,
        width:'100%',padding:'14px',borderRadius:14,fontSize:15,fontWeight:800,marginTop:8,
        background:`linear-gradient(135deg,rgba(0,229,212,0.15),rgba(0,160,233,0.1))`,
        border:`1.5px solid ${C.biolume}`,color:C.biolume,cursor:'pointer',
        boxShadow:'0 0 20px rgba(0,229,212,0.15)'}}>
        + Add Dive Spots
      </button>
    </div>
  );
}

/* ─── MAIN APP ─── */
function MainApp({ onSignOut }) {
  const [tab, setTab] = useState('trips');
  const [panel, setPanel] = useState(null);
  /** Persists while Add Spots panel is open so we return to the same list instead of the lists root. */
  const [spotsListFocusId, setSpotsListFocusId] = useState(null);
  const [newListModalKey, setNewListModalKey] = useState(0);
  const [actionOpen, setActionOpen] = useState(false);
  const [profileOpen, setProfileOpen] = useState(false);
  const [importUiTheme, setImportUiTheme] = useState(() => {
    try {
      const v = localStorage.getItem(LS_IMPORT_UI_THEME);
      return v === 'light' ? 'light' : 'dark';
    } catch (_) {
      return 'dark';
    }
  });
  const [selectedTrip, setSelectedTrip] = useState(null);
  const [trips, setTrips] = useState(TRIPS);
  const [planPrefill, setPlanPrefill] = useState('');
  const [planSessionId, setPlanSessionId] = useState(0);
  const [headerDest, setHeaderDest] = useState('');
  const [headerPred, setHeaderPred] = useState([]);
  const [headerDropdownOpen, setHeaderDropdownOpen] = useState(false);
  const [headerYouMayLike, setHeaderYouMayLike] = useState([]);
  const [headerYouMayLikeLoading, setHeaderYouMayLikeLoading] = useState(false);
  const [headerAreaLabel, setHeaderAreaLabel] = useState('');
  const [headerPlaceDetailId, setHeaderPlaceDetailId] = useState(null);
  const [headerPlaceDetailData, setHeaderPlaceDetailData] = useState(null);
  const [headerPlaceDetailLoading, setHeaderPlaceDetailLoading] = useState(false);

  const [userLists, setUserLists] = useState(() => {
    const raw = localStorage.getItem(LS_USER_LISTS);
    if (raw == null || raw === '') return DEFAULT_USER_LISTS;
    try {
      const v = JSON.parse(raw);
      return Array.isArray(v) ? v : DEFAULT_USER_LISTS;
    } catch (_) {
      return DEFAULT_USER_LISTS;
    }
  });
  const [savedSpots, setSavedSpots] = useState(() => {
    const raw = localStorage.getItem(LS_USER_SPOTS);
    if (raw == null || raw === '') return DEMO_USER_SPOTS;
    try {
      const v = JSON.parse(raw);
      return Array.isArray(v) ? v : DEMO_USER_SPOTS;
    } catch (_) {
      return DEMO_USER_SPOTS;
    }
  });

  const sharedMapRef = useRef(null);
  const tripMarkersRef = useRef([]);
  const userPlaceMarkersRef = useRef([]);
  const nearbyPlaceMarkersRef = useRef([]);
  const nearbyUserMarkerRef = useRef(null);
  const profileWrapRef = useRef(null);
  const headerSearchRef = useRef(null);
  const headerPlaceDetailRef = useRef(null);

  useEffect(() => {
    saveJson(LS_USER_LISTS, userLists);
  }, [userLists]);
  useEffect(() => {
    saveJson(LS_USER_SPOTS, savedSpots);
  }, [savedSpots]);

  useEffect(() => {
    try {
      localStorage.setItem(LS_IMPORT_UI_THEME, importUiTheme);
    } catch (_) {}
  }, [importUiTheme]);

  useEffect(() => {
    if (!profileOpen) return;
    const fn = (e) => {
      if (profileWrapRef.current && !profileWrapRef.current.contains(e.target)) setProfileOpen(false);
    };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, [profileOpen]);

  useEffect(() => {
    const q = headerDest.trim();
    if (q.length < 2) {
      setHeaderPred([]);
      return;
    }
    const t = setTimeout(() => {
      fetchDestinationPredictions(q).then(setHeaderPred);
    }, 380);
    return () => clearTimeout(t);
  }, [headerDest]);

  useEffect(() => {
    if (!headerPlaceDetailId) {
      setHeaderPlaceDetailData(null);
      return;
    }
    let cancelled = false;
    setHeaderPlaceDetailLoading(true);
    fetchGooglePlaceDetails(headerPlaceDetailId)
      .then((p) => {
        if (!cancelled) {
          setHeaderPlaceDetailData(p);
          setHeaderPlaceDetailLoading(false);
        }
      })
      .catch(() => {
        if (!cancelled) {
          setHeaderPlaceDetailData(null);
          setHeaderPlaceDetailLoading(false);
        }
      });
    return () => {
      cancelled = true;
    };
  }, [headerPlaceDetailId]);

  useEffect(() => {
    const fn = (e) => {
      if (headerPlaceDetailRef.current && headerPlaceDetailRef.current.contains(e.target)) return;
      if (headerSearchRef.current && !headerSearchRef.current.contains(e.target)) {
        setHeaderPred([]);
        setHeaderDropdownOpen(false);
      }
    };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, []);

  const openPlan = () => {
    setPlanPrefill('');
    setPlanSessionId((s) => s + 1);
    setPanel('plan');
  };

  const openPlanWithPrefill = (text) => {
    setPlanPrefill(text || '');
    setPlanSessionId((s) => s + 1);
    setHeaderDest('');
    setHeaderPred([]);
    setHeaderDropdownOpen(false);
    setHeaderYouMayLike([]);
    setHeaderAreaLabel('');
    setPanel('plan');
  };

  const loadHeaderAreaFromPlaceId = async (placeId, labelMain) => {
    setHeaderYouMayLikeLoading(true);
    setHeaderAreaLabel(labelMain || '');
    let attempts = 0;
    while (attempts < 35 && (!window.google || !google.maps?.places)) {
      await new Promise((r) => setTimeout(r, 120));
      attempts += 1;
    }
    const loc = await getLatLngFromPlaceId(placeId);
    if (loc) {
      const list = await fetchYouMayLikeNearLocation(loc.lat, loc.lng);
      setHeaderYouMayLike(list);
    } else {
      setHeaderYouMayLike([]);
    }
    setHeaderYouMayLikeLoading(false);
  };

  const onHeaderPickPredictionExplore = (p) => {
    setHeaderDest(p.description);
    setHeaderPred([]);
    setHeaderDropdownOpen(true);
    loadHeaderAreaFromPlaceId(p.place_id, p.main_text);
  };

  const onBrowseCityChip = (city) => {
    setHeaderDest(`${city.name}, ${city.country}`);
    setHeaderPred([]);
    setHeaderDropdownOpen(true);
    setHeaderYouMayLikeLoading(true);
    setHeaderAreaLabel(city.name);
    let attempts = 0;
    const run = () => {
      if (attempts < 40 && (!window.google || !google.maps)) {
        attempts += 1;
        setTimeout(run, 120);
        return;
      }
      if (!window.google || !google.maps) {
        setHeaderYouMayLike([]);
        setHeaderYouMayLikeLoading(false);
        return;
      }
      const geo = new google.maps.Geocoder();
      geo.geocode({ address: `${city.name}, ${city.country}` }, async (results, status) => {
        if (status === 'OK' && results[0]) {
          const loc = results[0].geometry.location;
          const list = await fetchYouMayLikeNearLocation(loc.lat(), loc.lng());
          setHeaderYouMayLike(list);
        } else {
          setHeaderYouMayLike([]);
        }
        setHeaderYouMayLikeLoading(false);
      });
    };
    run();
  };

  const clearTripMarkers = () => {
    tripMarkersRef.current.forEach(m => m.setMap(null));
    tripMarkersRef.current = [];
  };

  const clearUserPlaceMarkers = () => {
    userPlaceMarkersRef.current.forEach((m) => {

      m.setMap(null);
    });
    userPlaceMarkersRef.current = [];
  };

  const clearNearbyMarkers = () => {
    nearbyPlaceMarkersRef.current.forEach((m) => m.setMap(null));
    nearbyPlaceMarkersRef.current = [];
    if (nearbyUserMarkerRef.current) {
      nearbyUserMarkerRef.current.setMap(null);
      nearbyUserMarkerRef.current = null;
    }
  };

  const syncNearbyMap = useCallback(({ active, geoState, userLoc, nearbyDiscover }) => {
    const map = sharedMapRef.current;
    if (!map || !window.google || !google.maps) return;
    if (!active || geoState !== 'ready' || !userLoc) {
      clearNearbyMarkers();
      return;
    }

    clearNearbyMarkers();

    nearbyUserMarkerRef.current = new google.maps.Marker({
      position: { lat: userLoc.lat, lng: userLoc.lng },
      map,
      title: 'You are here',
      label: {
        text: '🧍',
        fontSize: '18px',
      },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 9,
        fillColor: '#3b82f6',
        fillOpacity: 1,
        strokeColor: 'white',
        strokeWeight: 2,
      },
      zIndex: 1000,
    });

    const nearbyRows = [...(nearbyDiscover?.food || []), ...(nearbyDiscover?.fun || [])]
      .filter((p) => p && typeof p.lat === 'number' && typeof p.lng === 'number')
      .slice(0, 16);

    nearbyRows.forEach((p) => {
      const marker = new google.maps.Marker({
        position: { lat: p.lat, lng: p.lng },
        map,
        title: p.name || 'Nearby place',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: p.bucket === 'food' ? '#ffb84d' : '#a78bfa',
          fillOpacity: 1,
          strokeColor: 'white',
          strokeWeight: 2,
        },
      });
      nearbyPlaceMarkersRef.current.push(marker);
    });

    map.panTo({ lat: userLoc.lat, lng: userLoc.lng });
    map.setZoom(13);
  }, []);

  const addPlaceToMap = (place, opts = {}) => {
    const panMap = opts.panMap !== false;
    if (!window.google || !google.maps) {
      alert('Map is still loading — try again in a moment.');
      return;
    }
    const map = sharedMapRef.current;
    if (!map) return;
    const geo = new google.maps.Geocoder();
    resolveUserPlaceGeocode(geo, place, (result) => {
      if (!result || !result.geometry || !result.geometry.location) {
        alert('Could not find that place on the map. Try a clearer name or add a region in your paste.');
        return;
      }
      const loc = result.geometry.location;
      clearTripMarkers();
      const marker = createZoomAwareUserPingMarker({
        map,
        position: loc,
        title: place.name,
        fillColor: '#ffb84d',
        strokeColor: 'white',
      });
      userPlaceMarkersRef.current.push(marker);
      if (panMap) {
        map.panTo(loc);
        map.setZoom(14);
      }
      const sid = `u-${Date.now()}`;
      const hint = place.destinationHint || '';
      const addr = result.formatted_address || hint || place.name;
      const shortLoc = typeof addr === 'string' ? addr.split(',').slice(-3).join(',').trim() : hint;
      setSavedSpots((sp) => [
        ...sp,
        {
          id: sid,
          name: place.name,
          loc: shortLoc || place.name,
          emoji: '📍',
          color: '#ffb84d',
          listId: null,
          lat: loc.lat(),
          lng: loc.lng(),
        },
      ]);
    });
  };

  const addPlaceToList = (place, listId, listMeta, opts = {}) => {
    const skipMapPing = opts.skipMapPing === true;
    const list =
      userLists.find((l) => l.id === listId) ||
      (listMeta && listMeta.id === listId ? listMeta : null);
    if (!list) return;
    const map = sharedMapRef.current;

    const pingMapIfNeeded = (lat, lng) => {
      if (skipMapPing || !map || !window.google || !google.maps) return;
      clearTripMarkers();
      const pos = { lat, lng };
      const marker = createZoomAwareUserPingMarker({
        map,
        position: pos,
        title: place.name,
        fillColor: list.color || C.biolume,
        strokeColor: 'white',

      userPlaceMarkersRef.current.push(marker);
      map.panTo(pos);
      map.setZoom(14);
    };

    const finish = (lat, lng, locLabel) => {
      const sid = `u-${Date.now()}`;
      setSavedSpots((sp) => [
        ...sp,
        {
          id: sid,
          name: place.name,
          loc: locLabel || place.destinationHint || 'Saved',
          emoji: '🍽️',
          color: list.color || C.biolume,
          listId,
          lat,
          lng,
        },
      ]);
      pingMapIfNeeded(lat, lng);
    };

    if (!window.google || !google.maps) {
      const [la, ln] = roughCenterForDestination(`${place.name}|${place.destinationHint || ''}`);
      finish(la, ln, place.destinationHint || '');
      return;
    }
    const geo = new google.maps.Geocoder();
    resolveUserPlaceGeocode(geo, place, (result) => {
      if (!result || !result.geometry || !result.geometry.location) {
        alert('Could not find that place on the map. Try a clearer name or add a region hint.');
        return;
      }
      const loc = result.geometry.location;
      const hint = place.destinationHint || '';
      const addr = result.formatted_address || hint;
      const shortLoc = typeof addr === 'string' ? addr.split(',').slice(-3).join(',').trim() : hint;
      finish(loc.lat(), loc.lng(), shortLoc);
    });

                    {googleMapsFromPlace ? (
                      <div style={{marginTop:8}}>
                        <a href={googleMapsFromPlace} target="_blank" rel="noopener noreferrer" style={{color:C.textMut,fontSize:11}}>
                          Open in Google Maps
                        </a>
                      </div>
                    ) : null}
                  </div>
                );
              })()
            ) : (
              <div style={{color:'#ff6e7a',fontSize:13}}>Could not load details.</div>
            )}
          </div>
        </div>
      )}

      {/* CONTENT AREA */}
      <div style={{position:'relative',zIndex:5,flex:1,display:'flex',overflow:'hidden'}}>
        {/* MAP */}
        <div style={{flex:1,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',inset:0,overflow:'hidden'}}>
            <OceanMap mapRef={sharedMapRef} onMarkerClick={handleWorldMarkerClick}/>
          </div>
          <div style={{position:'absolute',bottom:30,left:'50%',transform:'translateX(-50%)',
            background:'rgba(4,8,20,0.8)',border:`1px solid ${C.glassBd}`,borderRadius:99,
            padding:'8px 16px',backdropFilter:'blur(10px)',color:C.textSec,fontSize:13,fontWeight:600,
            display:'flex',alignItems:'center',gap:8,zIndex:10,pointerEvents:'none'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:C.biolume,
              boxShadow:`0 0 8px ${C.biolume}`,animation:'pulse 2s infinite'}}/>
            Drag to explore the ocean
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div style={{width:360,background:'rgba(6,14,28,0.88)',backdropFilter:'blur(20px)',
          borderLeft:`1px solid ${C.glassBd}`,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {panel===null && <>
            <div style={{display:'flex',borderBottom:`1px solid ${C.glassBd}`}}>
              {['trips','spots'].map(t=>(
                <button key={t} type="button" data-testid={t==='trips'?'tab-trips':'tab-spots'} onClick={()=>setTab(t)} style={{
                  flex:1,padding:'16px',fontWeight:800,fontSize:14,cursor:'pointer',
                  background:'none',border:'none',color:tab===t?'white':C.textSec,
                  borderBottom:`2px solid ${tab===t?C.biolume:'transparent'}`,
                  textTransform:'capitalize',transition:'all 0.2s',
                }}>{t==='trips'?'🌊 Expeditions':'🐠 Spots'}</button>
              ))}
            </div>
            <div style={{flex:1,overflow:'hidden'}}>
              {tab==='trips' && <TripsTab trips={trips} onPlan={openPlan} onTripClick={handleTripClick}/>}
              {tab==='spots' && (
                <SpotsTab
                  onAddSpots={() => setPanel('addspots')}
                  savedSpots={savedSpots}
                  userLists={userLists}
                  onNearbyMapSync={syncNearbyMap}
                  listFocusId={spotsListFocusId}
                  onListFocusIdChange={setSpotsListFocusId}
                />
              )}
            </div>
          </>}
          {panel==='plan' && (
            <PlanTripPanel
              key={planSessionId}
              initialDest={planPrefill}
              userLists={userLists}
              savedSpots={savedSpots}
              onClose={() => { setPanel(null); setPlanPrefill(''); }}
              onPlan={handlePlanFromPanel}
            />
          )}
          {panel==='detail' && selectedTrip && <TripDetail trip={selectedTrip} onBack={handleBack}/>}
          {panel==='addspots' && (
            <AddSpotsSheet
              onClose={() => setPanel(null)}
              userLists={userLists}
              onAddPlaceToMap={(place) => addPlaceToMap(place, { panMap: false })}
              onAddPlaceToList={addPlaceToList}
              onCreateList={createListInline}
              importUiTheme={importUiTheme}
            />
          )}
          {panel==='newlist' && (
            <NewListModal
              key={newListModalKey}
              onClose={() => setPanel(null)}
              onCreate={(name) => handleCreateList(name)}
            />
          )}
        </div>
      </div>

      {/* FAB */}
      <button type="button" data-testid="fab-main" onClick={()=>setActionOpen(v=>!v)} style={{
        position:'absolute',bottom:24,right:24,zIndex:20,
        width:56,height:56,borderRadius:'50%',
        background:actionOpen?'#ff6e7a':`linear-gradient(135deg,${C.biolume},#00a0e9)`,
        border:'none',fontSize:28,cursor:'pointer',transition:'all 0.3s',
        boxShadow:`0 0 30px ${actionOpen?'rgba(255,110,122,0.4)':'rgba(0,229,212,0.5)'}`,
        display:'flex',alignItems:'center',justifyContent:'center',
        transform:actionOpen?'rotate(45deg)':'rotate(0deg)',
      }}>+</button>

      {actionOpen && <ActionSheet onClose={()=>setActionOpen(false)} onAction={handleAction}/>}

      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
    </div>
  );
}

/* ─── SPLASH SCREEN ─── */

          background:`rgba(0,229,212,${0.2+Math.random()*0.4})`,

        <div style={{color:'white',fontSize:52,fontWeight:900,letterSpacing:'-2px',
          textShadow:'0 0 40px rgba(0,229,212,0.4)',lineHeight:1}}>DeepDive</div>
        <div style={{color:C.textSec,fontSize:16,marginTop:10,fontWeight:600}}>Explore the ocean. Plan your adventure.</div>
      </div>
      <div style={{marginTop:32,display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:320}}>

          padding:'18px',borderRadius:18,fontSize:18,fontWeight:900,cursor:'pointer',

        <div style={{textAlign:'center'}}><CoralFish size={56}/><div style={{color:C.textMut,fontSize:11,marginTop:4}}>Coral</div></div>
        <div style={{textAlign:'center'}}><PearlPuffer size={56}/><div style={{color:C.textMut,fontSize:11,marginTop:4}}>Pearl</div></div>
        <div style={{textAlign:'center'}}><SeahorseGuide size={42}/><div style={{color:C.textMut,fontSize:11,marginTop:4}}>Shelby</div></div>
      </div>
      <style>{`
        @keyframes float0{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
        @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ─── TWEAKS PANEL ─── */
const TWEAK_DEFAULTS = { accentColor:'#6fd8be', showMascots:true, panelWidth:360 };

function TweaksPanel({tweaks, onChange, onClose}) {
  return (
    <div style={{position:'fixed',bottom:80,right:24,zIndex:1000,background:'rgba(6,14,28,0.97)',
      border:`1px solid ${C.glassBd}`,borderRadius:20,padding:'20px',width:260,
      backdropFilter:'blur(20px)',boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <span style={{color:C.biolume,fontWeight:800,fontSize:14}}>Tweaks</span>
        <button onClick={onClose} style={{color:C.textSec,fontSize:16,cursor:'pointer'}}>✕</button>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{color:C.textSec,fontSize:12,fontWeight:700,display:'block',marginBottom:6}}>Accent Color</label>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {['#00e5d4','#ff6e7a','#ffb84d','#6fd8be','#a78bfa'].map(c=>(
            <button key={c} onClick={()=>onChange({...tweaks,accentColor:c})} style={{
              width:28,height:28,borderRadius:'50%',background:c,
              border:`3px solid ${tweaks.accentColor===c?'white':'transparent'}`,cursor:'pointer'}}/>
          ))}
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{color:C.textSec,fontSize:12,fontWeight:700}}>Show Mascots</span>
        <button onClick={()=>onChange({...tweaks,showMascots:!tweaks.showMascots})} style={{
          width:44,height:24,borderRadius:99,border:'none',cursor:'pointer',transition:'all 0.3s',
          background:tweaks.showMascots?C.biolume:'rgba(255,255,255,0.15)',position:'relative'}}>
          <div style={{position:'absolute',top:3,left:tweaks.showMascots?22:3,width:18,height:18,
            borderRadius:'50%',background:'white',transition:'all 0.3s'}}/>
        </button>
      </div>
    </div>
  );
}

/* ─── ROOT APP ─── */
function App() {
  const savedScreen = localStorage.getItem('dd_screen') || 'splash';
  const savedOnboard = parseInt(localStorage.getItem('dd_onboard') || '0');
  const [screen, setScreen] = useState(savedScreen);
  const [onboardStep, setOnboardStep] = useState(savedOnboard);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => { localStorage.setItem('dd_screen', screen); }, [screen]);
  useEffect(() => { localStorage.setItem('dd_onboard', String(onboardStep)); }, [onboardStep]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleTweakChange = (t) => {
    setTweaks(t);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:t}, '*');
  };

  const goOnboard = (step) => { setOnboardStep(step); setScreen('onboard'); };

  return (
    <div style={{width:'100vw',height:'100vh',overflow:'hidden',position:'relative'}}>
      {screen==='splash' && <SplashScreen onStart={()=>goOnboard(1)} onSignIn={()=>goOnboard(1)}/>}
      {screen==='onboard' && onboardStep===1 && <OnboardAgeScreen onNext={()=>setOnboardStep(2)} onBack={()=>setScreen('splash')}/>}
      {screen==='onboard' && onboardStep===2 && <OnboardTripScreen onNext={()=>setOnboardStep(3)} onBack={()=>setOnboardStep(1)}/>}
      {screen==='onboard' && onboardStep===3 && <OnboardStyleScreen onNext={()=>setScreen('app')} onBack={()=>setOnboardStep(2)}/>}
      {screen==='app' && (
        <MainApp
          onSignOut={() => {
            try {
              localStorage.setItem('dd_screen', 'splash');
            } catch (_) {}
            setScreen('splash');
          }}
        />
      )}
      {tweaksVisible && <TweaksPanel tweaks={tweaks} onChange={handleTweakChange} onClose={()=>setTweaksVisible(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
